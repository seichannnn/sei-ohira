<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aesthetic Signage OS - Ohira Pro v6.7</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&family=Noto+Sans+JP:wght@100;300;400;500;700;900&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; overflow: hidden; background-color: #f6f8fa; color: #1e293b; transition: padding 0.5s ease; }
    .serif-letterpress { font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; letter-spacing: -0.04em; }
    .minimal-tech { font-family: 'Space Grotesk', sans-serif; letter-spacing: 0.2em; }
    
    /* マウスカーソルを完全に非表示にするクラス */
    body.hide-cursor, body.hide-cursor * { cursor: none !important; }

    /* シネマティックで静かなスライドトランジション */
    .slide-transition { opacity: 0; transform: scale(1.01); transition: opacity 1.6s cubic-bezier(0.16, 1, 0.3, 1), transform 1.6s cubic-bezier(0.16, 1, 0.3, 1); }
    .slide-transition.active { opacity: 1; transform: scale(1); }

    /* スライド内要素の時間差スタッガードアニメーション */
    .slide-transition .slide-title,
    .slide-transition .slide-body,
    .slide-transition .slide-item-card,
    .slide-transition .slide-badge,
    .slide-transition .slide-line,
    .slide-transition .slide-countdown-box,
    .slide-transition .slide-qr-box {
      opacity: 0; transform: translateY(20px); transition: opacity 1.4s cubic-bezier(0.16, 1, 0.3, 1), transform 1.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .slide-transition.active .slide-title { opacity: 1; transform: translateY(0); transition-delay: 0.2s; }
    .slide-transition.active .slide-body { opacity: 0.8; transform: translateY(0); transition-delay: 0.4s; }
    .slide-transition.active .slide-badge { opacity: 1; transform: translateY(0); transition-delay: 0.1s; }
    .slide-transition.active .slide-line { opacity: 1; transform: translateY(0); transition-delay: 0.3s; }
    .slide-transition.active .slide-item-card { opacity: 1; transform: translateY(0); }
    .slide-transition.active .slide-countdown-box { opacity: 1; transform: translateY(0); transition-delay: 0.3s; }
    .slide-transition.active .slide-qr-box { opacity: 1; transform: translateY(0); transition-delay: 0.5s; }

    /* ギャラリー用のKen Burns効果 */
    .slide-transition .slide-image-container { opacity: 0; transform: scale(0.96) translateX(-20px); transition: opacity 1.8s cubic-bezier(0.16, 1, 0.3, 1), transform 1.8s cubic-bezier(0.16, 1, 0.3, 1); transition-delay: 0.1s; }
    .slide-transition.active .slide-image-container { opacity: 1; transform: scale(1) translateX(0); }
    .slide-transition .slide-zoom-img { transform: scale(1.15); transition: transform 15s cubic-bezier(0.25, 1, 0.5, 1); }
    .slide-transition.active .slide-zoom-img { transform: scale(1.0); }

    .satin-glass { background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(40px); border: 1px rgba(255, 255, 255, 0.6) solid; box-shadow: 0 20px 60px rgba(15, 23, 42, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.8); }
    @keyframes slow-ambient { 0% { transform: translate(0px, 0px) scale(1); } 50% { transform: translate(30px, -15px) scale(1.05); } 100% { transform: translate(0px, 0px) scale(1); } }
    .ambient-aurora { animation: slow-ambient 35s infinite alternate ease-in-out; }
    .progress-bar-fill { width: 0%; transition: width linear; }
    @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-50%, 0, 0); } }
    .ticker-content { display: inline-block; white-space: nowrap; animation: ticker 60s linear infinite; }
    body.pseudo-fs-active { padding: 0 !important; }
    body.pseudo-fs-active header, body.pseudo-fs-active footer { display: none !important; }
    body.pseudo-fs-active main { margin: 0 !important; padding: 0 !important; height: 100vh !important; width: 100vw !important; }
    body.pseudo-fs-active main .satin-glass { border-radius: 0px !important; border: none !important; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
  </style>
</head>
<body class="w-screen h-screen flex flex-col justify-between relative select-none p-6 md:p-10">

  <!-- ==================== BACKGROUND ==================== -->
  <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden bg-[#f6f8fa]">
    <div class="ambient-aurora absolute top-[-20%] left-[-15%] w-[80vw] h-[80vh] bg-gradient-to-tr from-blue-200/30 via-indigo-100/20 to-transparent rounded-full filter blur-[120px]"></div>
    <div class="ambient-aurora absolute bottom-[-20%] right-[-15%] w-[80vw] h-[80vh] bg-gradient-to-tr from-pink-100/30 via-purple-100/20 to-transparent rounded-full filter blur-[120px]" style="animation-delay: -10s;"></div>

        <button onclick="window.toggleFullscreen()" class="p-2 bg-black/[0.03] hover:bg-black/[0.08] rounded-full transition-all text-slate-500 hover:text-slate-800 border border-black/[0.05] flex items-center justify-center" title="全画面表示"><i id="fullscreen-icon" data-lucide="maximize" class="w-4 h-4"></i></button>

      <button id="admin-mode-indicator" onclick="window.toggleAdminPanel()" class="hidden px-4 py-2 bg-slate-900 text-white hover:bg-slate-800 rounded-xl transition-all text-[10px] font-bold minimal-tech shadow-md tracking-widest uppercase">
        Designer Studio

  <!-- ==================== DISPLAY CANVAS ==================== -->

    <div class="absolute bottom-0 left-0 right-0 h-[2px] bg-black/[0.02] overflow-hidden z-20">

  <button id="exit-pseudo-fs-btn" onclick="window.exitPseudoFullscreen()" class="hidden fixed top-6 right-6 z-[100] p-3 bg-slate-900/80 text-white rounded-full shadow-2xl backdrop-blur-md transition-all active:scale-95 border border-white/10 flex items-center justify-center"><i data-lucide="minimize"></i></button>

    <div class="ticker-wrap flex-grow h-full flex items-center text-slate-600 font-light text-xs tracking-widest uppercase overflow-hidden">

  <!-- ==================== ADMIN DRAWER ==================== -->
  <div id="admin-panel" class="fixed inset-0 bg-white/95 backdrop-blur-3xl z-50 flex justify-end transform translate-x-full transition-transform duration-500 ease-[cubic-bezier(0.16,1,0.3,1)]">
    <div class="w-full max-w-4xl bg-[#fafafa] h-full shadow-2xl flex flex-row border-l border-slate-200">
      
      <!-- Slide Stack List -->
      <div class="w-72 border-r border-slate-100 flex flex-col h-full bg-slate-50/50">

      <!-- Editor Detail -->
      <div class="flex-grow flex flex-col h-full overflow-hidden">

          <h2 class="text-[11px] font-bold text-slate-800 tracking-widest uppercase minimal-tech">Global Configuration</h2>

        <div class="flex-grow overflow-y-auto p-8 space-y-10 custom-scrollbar text-left">

            <div class="grid grid-cols-2 gap-6 bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">

                <label class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Footer News Ticker</label>

          <section class="space-y-4">
            <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest minimal-tech flex items-center gap-2"><i data-lucide="sparkles" class="w-4 h-4 text-indigo-400"></i> AI Link (Gemini)</h3>
            <div class="p-6 bg-indigo-50/20 border border-indigo-100/50 rounded-[32px] space-y-4">
              <p class="text-[11px] text-slate-500 leading-relaxed">Gemini APIキーを設定すると、AIが自動で知的なスライドを生成する機能が解放されます。</p>
              <input type="password" id="api-key-input" placeholder="AIzaSy..." class="w-full px-4 py-2.5 rounded-xl bg-white border border-indigo-100 text-slate-800 text-sm focus:outline-none shadow-inner">
              <button onclick="window.saveApiKey()" class="px-6 py-2 bg-indigo-600 text-white rounded-xl text-[9px] font-bold minimal-tech tracking-widest">CONNECT AI</button>
            </div>
          </section>
        </div>

        <div class="p-6 bg-slate-50 border-t border-slate-100 flex justify-between items-center">
          <button onclick="window.resetToDefaults()" class="text-rose-400 text-[10px] font-bold minimal-tech hover:text-rose-600 transition-all uppercase tracking-widest">Factory Reset</button>
          <p class="text-[9px] text-slate-300 minimal-tech tracking-[0.2em] uppercase">sei ohira portal // MIYAGI OHIRA</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== VISUAL COMPOSER MODAL ==================== -->
  <div id="slide-creator-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xl z-[60] flex items-center justify-center p-4 hidden">
    <div class="w-full max-w-6xl bg-white rounded-[40px] shadow-2xl flex flex-col h-[90vh] overflow-hidden">
      <div class="p-8 border-b border-slate-50 flex justify-between items-center text-left">
        <h3 class="text-[11px] font-bold text-slate-800 uppercase tracking-[0.3em] minimal-tech">Slide Visual Composer Pro</h3>
        <button onclick="window.closeNewSlideModal()" class="p-2 bg-slate-50 hover:bg-slate-100 rounded-full text-slate-400 transition-all"><i data-lucide="x" class="w-5 h-5"></i></button>

      <div class="flex-grow flex flex-row overflow-hidden">

        <div class="w-[420px] p-8 overflow-y-auto custom-scrollbar space-y-8 bg-slate-50/20 border-r border-slate-50 text-left">

              </button>
              <button onclick="window.selectLayout('image')" class="layout-btn p-4 rounded-2xl border-2 border-slate-100 bg-white text-left transition-all hover:border-indigo-200">
                <i data-lucide="image" class="w-4 h-4 mb-2"></i><div class="text-[9px] font-bold text-slate-700 uppercase">Gallery</div>
              </button>
              <button onclick="window.selectLayout('lunch')" class="layout-btn p-4 rounded-2xl border-2 border-slate-100 bg-white text-left transition-all hover:border-indigo-200">
                <i data-lucide="utensils" class="w-4 h-4 mb-2 text-rose-400"></i><div class="text-[9px] font-bold text-slate-700 uppercase">Lunch Menu</div>
              </button>
              <button onclick="window.selectLayout('countdown')" class="layout-btn p-4 rounded-2xl border-2 border-slate-100 bg-white text-left transition-all hover:border-indigo-200">
                <i data-lucide="hourglass" class="w-4 h-4 mb-2 text-indigo-400"></i><div class="text-[9px] font-bold text-slate-700 uppercase">Countdown</div>
              </button>
              <button onclick="window.selectLayout('qrcode')" class="layout-btn p-4 rounded-2xl border-2 border-slate-100 bg-white text-left transition-all hover:border-indigo-200">
                <i data-lucide="qr-code" class="w-4 h-4 mb-2 text-emerald-400"></i><div class="text-[9px] font-bold text-slate-700 uppercase">QR Code Link</div>
              </button>
              <button onclick="window.selectLayout('hero')" class="layout-btn p-4 rounded-2xl border-2 border-slate-100 bg-white text-left transition-all hover:border-indigo-200">
                <i data-lucide="megaphone" class="w-4 h-4 mb-2 text-amber-400"></i><div class="text-[9px] font-bold text-slate-700 uppercase">Hero News</div>
              </button>
            </div>
          </div>

          <div class="space-y-6" id="visual-editor-inputs">
            <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest minimal-tech">2. Content Entry</label>
            <div id="dynamic-visual-inputs" class="space-y-5"></div>
          </div>
        </div>

        <!-- Designer Preview (Right) -->
        <div class="flex-grow bg-slate-100/50 p-12 flex items-center justify-center overflow-hidden">
          <div class="relative w-[1280px] h-[720px] shadow-2xl rounded-[32px] overflow-hidden bg-white scale-[0.45] transform-gpu origin-center">
            <div id="live-designer-preview" class="w-full h-full relative"></div>
          </div>
        </div>
      </div>

      <div class="p-8 border-t border-slate-50 bg-white flex justify-end gap-4">
        <button onclick="window.closeNewSlideModal()" class="px-8 py-3 text-slate-400 text-[10px] font-bold tracking-widest minimal-tech">CANCEL</button>
        <button id="save-slide-btn" onclick="window.saveSlideData()" class="px-10 py-3 bg-slate-900 text-white rounded-2xl text-[10px] font-bold tracking-widest minimal-tech shadow-xl">SAVE & SYNC</button>
      </div>
    </div>
  </div>

  <!-- ==================== ALERT COMPONENT ==================== -->
  <div id="custom-alert" class="fixed top-8 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 bg-slate-900 text-white rounded-full font-bold shadow-2xl flex items-center gap-2 transform -translate-y-24 transition-transform duration-300 pointer-events-none text-xs tracking-widest minimal-tech">
    <i data-lucide="check" class="w-4 h-4 text-emerald-400"></i>
    <span id="custom-alert-text">MESSAGE</span>
  </div>

  <!-- Firebase & System Module -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    const appId = 'sei-ohira-v60';
    const firebaseConfig = {
      apiKey: "AIzaSyAWN0wX9izOv5PqsRxMSC09lVSBGy_Oolk",
      authDomain: "sei-ohira.firebaseapp.com",
      projectId: "sei-ohira",
      storageBucket: "sei-ohira.firebasestorage.app",
      messagingSenderId: "615345211161",
      appId: "1:615345211161:web:f0c919a26d56e7ff2fa788",
      measurementId: "G-C3SYGNEN6C"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let slides = [];
    let tickerText = "【大衡中学校】おはようございます。本日は1学期任命式が行われます。 🌿 | 【お知らせ】万葉集読書会は図書室にて開催。 📚";
    let globalDuration = 8;
    let apiKey = localStorage.getItem(`${appId}-gemini-api-key`) || '';
    let currentSlideIndex = 0;
    let slideshowTimer = null;
    let isEditingMode = false;
    let activeDesignLayout = 'clock';
    let editingSlideId = null;
    let cursorTimeout = null;

    const slidesDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'slides-list', 'default');
    const settingsDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'default');

    // ==================== SECURITY SANITIZER ====================
    window.escapeHTML = (str) => {
      if (!str) return '';
      return String(str).replace(/[&<>"']/g, function(m) {
        switch (m) {
          case '&': return '&amp;';
          case '<': return '&lt;';
          case '>': return '&gt;';
          case '"': return '&quot;';
          case "'": return '&#039;';
          default: return m;
        }
      });
    };

    // ==================== BOOT ENGINE ====================
    window.addEventListener('DOMContentLoaded', async () => {
      lucide.createIcons();
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('mode') === 'admin') {
        isEditingMode = true;
        const adminBtn = document.getElementById('admin-mode-indicator');
        if (adminBtn) adminBtn.classList.remove('hidden');
      }

      await signInAnonymously(auth);
      onAuthStateChanged(auth, (user) => {
        if (user) {
          onSnapshot(slidesDocRef, (snap) => {
            if (snap.exists()) {
              slides = snap.data().slides || [];
              window.renderSlideshow();
              if (isEditingMode) window.renderAdminSlidesList();
            } else {
              window.autoInitializeDefaultData();
            }
          });
          onSnapshot(settingsDocRef, (snap) => {
            if (snap.exists()) {
              tickerText = snap.data().tickerText;
              globalDuration = snap.data().globalDuration;
            }
            window.applyTicker();
            window.startSlideshowLoop();
          });
        }
      });
      window.initUIEngines();
    });

    window.initUIEngines = () => {
      setInterval(() => {
        const now = new Date();
        const headerDate = document.getElementById('header-date');
        const headerTime = document.getElementById('header-time');
        if (headerDate) headerDate.innerText = now.toLocaleDateString('ja-JP', { year:'numeric', month:'2-digit', day:'2-digit', weekday:'short' }).toUpperCase();
        if (headerTime) headerTime.innerText = now.toLocaleTimeString('ja-JP', { hour12:false });
      }, 1000);
      window.initWeather();
      window.initCursorAutoHide();
    };

    window.initWeather = async () => {
      try {
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=38.47&longitude=140.88&current_weather=true&timezone=Asia%2FTokyo`);
        const data = await res.json();
        const weatherMap = { 0: "CLEAR", 1: "CLEAR", 2: "CLOUDY", 3: "CLOUDY", 45: "FOG", 61: "RAIN", 71: "SNOW", 95: "THUNDER" };
        const temp = Math.round(data.current_weather.temperature);
        const weatherText = document.getElementById('mini-weather-text');
        if (weatherText) weatherText.innerText = `OHIRA // ${temp}℃ ${weatherMap[data.current_weather.weathercode] || "CLEAR"}`;

              <p class="text-3xl text-slate-500 font-light leading-relaxed slide-body">${escapedContent}</p>
            </div>
            <div class="w-1/2 flex justify-center items-center slide-qr-box">
              <div class="p-8 bg-white rounded-[48px] shadow-2xl border-2 border-emerald-50 relative">
                <img src="${window.escapeHTML(qrUrl)}" class="w-80 h-80 object-contain">
                <div class="absolute -bottom-4 left-1/2 -translate-x-1/2 px-6 py-2 bg-emerald-500 text-white text-xs font-bold rounded-full shadow-lg minimal-tech">SCAN ME</div>
              </div>
            </div>
          </div>
        `;
      } else if (activeDesignLayout === 'hero' || activeDesignLayout === 'image') {
        layoutHTML = `
          <div class="slide-transition active w-full h-full p-20 flex items-center gap-20">
            <div class="w-1/2 h-full rounded-[48px] overflow-hidden shadow-2xl border-8 border-white bg-slate-100 slide-image-container">
              <img src="${safeImg}" class="w-full h-full object-cover">
            </div>
            <div class="w-1/2 space-y-8 text-left">
              <span class="text-xs font-bold text-indigo-500 tracking-[0.4em] minimal-tech uppercase slide-badge">Announcement</span>
              <h2 class="text-7xl font-black text-slate-800 leading-tight slide-title">${escapedTitle}</h2>
              <div class="h-2 w-24 bg-slate-900 rounded-full slide-line"></div>
              <p class="text-3xl text-slate-500 font-light leading-relaxed slide-body">${escapedContent}</p>
            </div>
          </div>
        `;
      }
      preview.innerHTML = layoutHTML;
      lucide.createIcons();
    };

    // ==================== EDIT & SAVE LOGIC ====================
    window.openNewSlideAction = () => {
      editingSlideId = null; 
      window.tempUploadedImageBase64 = ""; 
      document.getElementById('slide-creator-modal').classList.remove('hidden'); 
      window.selectLayout('clock');
    };

    window.openEditSlide = (idx) => {
      const s = slides[idx];
      editingSlideId = s.id; // 新規作成ではなく、編集IDを追跡
      document.getElementById('slide-creator-modal').classList.remove('hidden');
      window.selectLayout(s.type);
      
      setTimeout(() => {
        const titleInput = document.getElementById('ds-title');
        const contentInput = document.getElementById('ds-content');
        if (titleInput) titleInput.value = s.title || '';
        if (contentInput) contentInput.value = s.content || '';
        
        if (s.type === 'image' || s.type === 'hero') {
           window.tempUploadedImageBase64 = s.content_img || '';
           const inner = document.getElementById('ds-upload-inner');
           if (inner && s.content_img) inner.innerHTML = `<img src="${s.content_img}" class="w-full h-full object-cover rounded-xl">`;
        } else if (['countdown', 'qrcode'].includes(s.type)) {
           const imgInput = document.getElementById('ds-img');
           if (imgInput) imgInput.value = s.content_img || '';
        }
        window.updateLivePreview();
      }, 100);
    };

    window.saveSlideData = () => {
      const title = document.getElementById('ds-title').value;
      const content = document.getElementById('ds-content')?.value || "";
      const content_img = window.tempUploadedImageBase64 || document.getElementById('ds-img')?.value || "";

      if (editingSlideId) {
        // 既存スライドのIDを特定して置き換える（新規作成ではなく上書き）
        const idx = slides.findIndex(s => s.id === editingSlideId);
        if (idx !== -1) {
          slides[idx] = { ...slides[idx], type: activeDesignLayout, title, content, content_img };
        }
      } else {
        // 新規追加
        slides.push({ id: "s-"+Date.now(), type: activeDesignLayout, title, content, content_img, duration: 8 });
      }

      setDoc(slidesDocRef, { slides }).then(() => {
        document.getElementById('slide-creator-modal').classList.add('hidden');
        window.showAlert("SUCCESSFULLY SYNCED");
      });
    };

    window.deleteSlide = (idx) => {
      if (confirm("スライドを削除してもよろしいですか？")) {
        slides.splice(idx, 1);
        setDoc(slidesDocRef, { slides });
      }
    };

    // ==================== UI CONTROLS ====================
    window.toggleAdminPanel = () => {
      const p = document.getElementById('admin-panel');
      if (p) p.classList.toggle('translate-x-full');
      if (isEditingMode) {
        const durationInput = document.getElementById('global-duration');
        const tickerInput = document.getElementById('global-ticker-input');
        if (durationInput) durationInput.value = globalDuration;
        if (tickerInput) tickerInput.value = tickerText;
      }
    };
    window.openAdminPanelDirectly = () => window.toggleAdminPanel();
    window.closeNewSlideModal = () => document.getElementById('slide-creator-modal').classList.add('hidden');
    
    window.saveApiKey = () => { apiKey = document.getElementById('api-key-input').value; localStorage.setItem(`${appId}-gemini-api-key`, apiKey); window.showAlert("AI LINK SECURED"); };
    window.saveGlobalSettings = () => {
       globalDuration = parseInt(document.getElementById('global-duration').value) || 8;
       tickerText = document.getElementById('global-ticker-input').value;
       setDoc(settingsDocRef, { tickerText, globalDuration }).then(() => window.showAlert("STUDIO SYNCED"));
    };

    window.applyTicker = () => { const el = document.getElementById('ticker-content'); if (el) el.innerText = `${tickerText}   +++   ${tickerText}`; };
    window.showAlert = (msg) => { const el = document.getElementById('custom-alert'); document.getElementById('custom-alert-text').innerText = msg; el.classList.remove('-translate-y-24'); setTimeout(() => el.classList.add('-translate-y-24'), 3000); };

    window.renderAdminSlidesList = () => {
      const container = document.getElementById('admin-slides-list');
      if (!container) return;
      container.innerHTML = slides.map((s, i) => `
        <div class="p-4 bg-white rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between group">
          <div class="overflow-hidden">
            <p class="text-[8px] font-bold text-indigo-400 uppercase minimal-tech">${s.type}</p>
            <p class="text-xs font-bold text-slate-700 truncate">${window.escapeHTML(s.title)}</p>
          </div>
          <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-all">
            <button onclick="window.openEditSlide(${i})" class="p-1.5 text-slate-400 hover:text-indigo-600"><i data-lucide="edit-2" class="w-3.5 h-3.5"></i></button>
            <button onclick="window.deleteSlide(${i})" class="p-1.5 text-slate-400 hover:text-rose-500"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    };

    // サイレント初期化処理 (データベースが空の時は確認を出さずに自動で書き込み)
    window.autoInitializeDefaultData = () => {
      const def = [
        { id:"s1", type:"clock", title:"WELCOME", content:"大衡中学校デジタルサイネージへようこそ。今日も新しい発見を楽しもう！", duration:8 },
        { id:"s2", type:"weekly", title:"THIS WEEK", content:"月|専門委員会\n火|ノー部活デー\n水|実力テスト\n木|任命式\n金|英検", duration:10 }
      ];
      setDoc(slidesDocRef, { slides: def });
      setDoc(settingsDocRef, { tickerText: "【大衡中学校】おはようございます。本日は校内美化運動が実施されます。 🌿 | 読書旬間スタート。図書室でお待ちしています。 📚", globalDuration: 8 });
    };

    window.resetToDefaults = () => {
      if (confirm("全てのデータを消去し、大衡中学校の初期状態に戻しますか？")) {
        window.autoInitializeDefaultData();
      }
    };

    // 画像処理（自動圧縮）
    window.triggerImageFileSelect = () => document.getElementById('ds-image-file').click();
    window.handleImageSelect = (e) => { const f = e.target.files[0]; if (f) window.processUploadedImage(f); };
    window.handleImageDragOver = (e) => { e.preventDefault(); e.currentTarget.classList.add('border-indigo-400'); };
    window.handleImageDrop = (e) => { e.preventDefault(); e.currentTarget.classList.remove('border-indigo-400'); const f = e.dataTransfer.files[0]; if (f && f.type.startsWith('image/')) window.processUploadedImage(f); };

    window.processUploadedImage = (file) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX_W = 800;
          let w = img.width, h = img.height;
          if (w > MAX_W) { h *= MAX_W / w; w = MAX_W; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          window.tempUploadedImageBase64 = canvas.toDataURL('image/jpeg', 0.7);
          const inner = document.getElementById('ds-upload-inner');
          if (inner) {
            inner.innerHTML = `<img src="${window.tempUploadedImageBase64}" class="w-full h-full object-cover rounded-xl">`;
          } else {
            const dropZone = document.getElementById('ds-drop-zone');
            if (dropZone) dropZone.innerHTML = `<img src="${window.tempUploadedImageBase64}" class="w-full h-full object-cover rounded-xl">`;
          }
          window.updateLivePreview();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    };

    // フルスクリーン & 再読み込み
    window.toggleFullscreen = () => {
      const isCurrentlyFullscreen = document.fullscreenElement || document.webkitFullscreenElement;
      
      if (!isCurrentlyFullscreen) {
        const docEl = document.documentElement;
        const requestFS = docEl.requestFullscreen || docEl.webkitRequestFullscreen || docEl.mozRequestFullScreen || docEl.msRequestFullscreen;
        
        if (requestFS) {
          requestFS.call(docEl).then(() => {
            window.showAlert("全画面表示を開始しました");
          }).catch(err => {
            console.warn("Fullscreen denied by browser permissions policy. Falling back to window pseudo-fullscreen mode.", err);
            window.enterPseudoFullscreen();
          });
        } else {
          window.enterPseudoFullscreen();
        }
      } else {
        const exitFS = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
        if (exitFS) {
          exitFS.call(document).then(() => {
            window.showAlert("全画面表示を終了しました");
          }).catch(() => {
            window.exitPseudoFullscreen();
          });
        } else {
          window.exitPseudoFullscreen();
        }
      }
    };

    // ウィンドウ内疑似フルスクリーンモードの有効化
    window.enterPseudoFullscreen = () => {
      document.body.classList.add('pseudo-fs-active');
      const exitBtn = document.getElementById('exit-pseudo-fs-btn');
      if (exitBtn) exitBtn.classList.remove('hidden');
      
      const icon = document.getElementById('fullscreen-icon');
      if (icon) icon.setAttribute('data-lucide', 'minimize');
      lucide.createIcons();
      window.showAlert("簡易全画面表示に切り替えました");
    };

    // ウィンドウ内疑似フルスクリーンモードの無効化
    window.exitPseudoFullscreen = () => {
      document.body.classList.remove('pseudo-fs-active');
      const exitBtn = document.getElementById('exit-pseudo-fs-btn');
      if (exitBtn) exitBtn.classList.add('hidden');
      
      const icon = document.getElementById('fullscreen-icon');
      if (icon) icon.setAttribute('data-lucide', 'maximize');
      lucide.createIcons();
      window.showAlert("簡易全画面表示を終了しました");
    };

    window.reloadPage = () => {
      window.showAlert("ページを再読み込みします...");
      setTimeout(() => {
        window.location.reload();
      }, 800);
    };

    // フルスクリーン切り替え時のアイコン自動連動（標準規格対応）
    document.addEventListener('fullscreenchange', () => {
      const icon = document.getElementById('fullscreen-icon');
      if (!icon) return;
      if (document.fullscreenElement) {
        icon.setAttribute('data-lucide', 'minimize');
      } else {
        icon.setAttribute('data-lucide', 'maximize');
      }
      lucide.createIcons();
    });

    // キーボードのEscapeキー押下時に疑似フルスクリーンも解除する
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' || e.key === 'Esc') {
        if (document.body.classList.contains('pseudo-fs-active')) {
          window.exitPseudoFullscreen();
        }
      }
    });

    // ==================== NEW CURSOR AUTO HIDE LOGIC ====================
    window.initCursorAutoHide = () => {
      let lastX = 0;
      let lastY = 0;

      function resetCursorTimeout(e) {
        if (e && e.type === 'mousemove') {
          if (e.clientX === lastX && e.clientY === lastY) {
            return; 
          }
          lastX = e.clientX;
          lastY = e.clientY;
        }

        document.body.classList.remove('hide-cursor');
        clearTimeout(cursorTimeout);
        
        cursorTimeout = setTimeout(() => {
          const adminPanel = document.getElementById('admin-panel');
          const creatorModal = document.getElementById('slide-creator-modal');
          
          const isAdminOpen = adminPanel && !adminPanel.classList.contains('translate-x-full');
          const isModalOpen = creatorModal && !creatorModal.classList.contains('hidden');
          
          if (!isAdminOpen && !isModalOpen) {
            document.body.classList.add('hide-cursor');
          }
        }, 3000);
      }

      window.addEventListener('mousemove', resetCursorTimeout);
      window.addEventListener('mousedown', resetCursorTimeout);
      window.addEventListener('touchstart', resetCursorTimeout);
      window.addEventListener('keydown', resetCursorTimeout);
      
      resetCursorTimeout();
    };

    window.tempUploadedImageBase64 = "";
  </script>
</body>
</html>
