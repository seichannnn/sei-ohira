<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aesthetic Signage OS - Ohira Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&family=Noto+Sans+JP:wght@100;300;400;500;700&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; overflow: hidden; background-color: #f6f8fa; color: #1e293b; }
    .serif-letterpress { font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; letter-spacing: -0.04em; }
    .minimal-tech { font-family: 'Space Grotesk', sans-serif; letter-spacing: 0.2em; }
    .slide-transition { opacity: 0; transform: scale(0.99) translateY(4px); transition: opacity 1.8s cubic-bezier(0.16, 1, 0.3, 1), transform 1.8s cubic-bezier(0.16, 1, 0.3, 1); }
    .slide-transition.active { opacity: 1; transform: scale(1) translateY(0); }
    .satin-glass { background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(40px); border: 1px rgba(255, 255, 255, 0.6) solid; box-shadow: 0 20px 60px rgba(15, 23, 42, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.8); }
    @keyframes slow-ambient { 0% { transform: translate(0px, 0px) scale(1); } 50% { transform: translate(30px, -15px) scale(1.05); } 100% { transform: translate(0px, 0px) scale(1); } }
    .ambient-aurora { animation: slow-ambient 35s infinite alternate ease-in-out; }
    .progress-bar-fill { width: 0%; transition: width linear; }
    @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-50%, 0, 0); } }
    .ticker-content { display: inline-block; white-space: nowrap; animation: ticker 60s linear infinite; }
    .preview-canvas { transform: scale(0.4); transform-origin: top left; pointer-events: none; }
    .layout-card.selected { border-color: #6366f1; background-color: rgba(99, 102, 241, 0.05); }
  </style>
</head>
<body class="w-screen h-screen flex flex-col justify-between relative select-none p-6 md:p-10">

  <!-- ==================== AMBIENT BACKGROUND ==================== -->
  <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden bg-[#f6f8fa]">
    <div class="ambient-aurora absolute top-[-20%] left-[-15%] w-[80vw] h-[80vh] bg-gradient-to-tr from-blue-200/30 via-indigo-100/20 to-transparent rounded-full filter blur-[120px]"></div>
    <div class="ambient-aurora absolute bottom-[-20%] right-[-15%] w-[80vw] h-[80vh] bg-gradient-to-tr from-pink-100/30 via-purple-100/20 to-transparent rounded-full filter blur-[120px]" style="animation-delay: -10s;"></div>
  </div>

  <!-- ==================== MINIMAL HEADER ==================== -->
  <header class="w-full px-8 py-4 flex justify-between items-center z-10 satin-glass rounded-[20px] mb-6 shadow-sm">
    <div class="flex items-center gap-3">
      <span class="w-1.5 h-1.5 rounded-full bg-slate-500/60 animate-pulse"></span>
      <div class="flex flex-col text-left">
        <span class="text-[9px] font-bold tracking-[0.3em] text-slate-400 uppercase minimal-tech">OHIRA CAMPUS</span>
        <span class="text-xs font-light text-slate-600 uppercase">Signage OS Portal <span class="text-[9px] text-slate-400 ml-1">v5.0</span></span>
      </div>
    </div>
    <div class="flex items-center gap-8">
      <div id="mini-weather" class="flex items-center gap-2 text-[11px] text-slate-500 font-light">
        <span id="mini-weather-text" class="minimal-tech uppercase">OHIRA METEO LOADING</span>
      </div>
      <div class="text-right border-l border-slate-200 pl-6">
        <p id="header-date" class="text-[8px] text-slate-400 font-semibold uppercase tracking-widest minimal-tech"></p>
        <p id="header-time" class="text-base font-light text-slate-700 minimal-tech tracking-wider"></p>
      </div>
      <button id="admin-mode-indicator" onclick="openAdminPanelDirectly()" class="hidden px-4 py-2 bg-slate-900 text-white hover:bg-slate-800 rounded-xl transition-all text-[10px] font-bold minimal-tech shadow-md tracking-widest">
        DESIGNER STUDIO
      </button>
    </div>
  </header>

  <!-- ==================== DISPLAY CANVAS ==================== -->
  <main class="flex-grow w-full relative overflow-hidden z-10 flex items-center justify-center mb-6">
    <div id="slides-container" class="w-full h-full relative"></div>
    <div class="absolute bottom-0 left-0 right-0 h-[2px] bg-black/[0.02] overflow-hidden z-20">
      <div id="slide-progress" class="h-full bg-slate-400 progress-bar-fill"></div>
    </div>
  </main>

  <!-- ==================== MARQUEE FOOTER ==================== -->
  <footer class="w-full h-10 z-10 satin-glass rounded-[16px] overflow-hidden flex items-center px-6">
    <div class="text-[9px] font-bold text-slate-400 tracking-widest uppercase shrink-0 mr-6 flex items-center minimal-tech">宮城 大衡村 // UPDATES</div>
    <div class="ticker-wrap flex-grow h-full flex items-center text-slate-600 font-light text-xs tracking-widest uppercase overflow-hidden">
      <div id="ticker-content" class="ticker-content minimal-tech"></div>
    </div>
  </footer>

  <!-- ==================== VISUAL DESIGNER DRAWER ==================== -->
  <div id="admin-panel" class="fixed inset-0 bg-white/95 backdrop-blur-3xl z-50 flex justify-end transform translate-x-full transition-transform duration-500 ease-[cubic-bezier(0.16,1,0.3,1)]">
    <div class="w-full max-w-4xl bg-[#fafafa] h-full shadow-2xl flex flex-row border-l border-slate-200">
      
      <!-- 左：スライドスタック管理 -->
      <div class="w-64 border-r border-slate-100 flex flex-col h-full bg-slate-50/50">
        <div class="p-6 border-b border-slate-100 flex items-center gap-2">
          <i data-lucide="layers" class="w-4 h-4 text-slate-400"></i>
          <span class="text-[10px] font-bold text-slate-800 uppercase tracking-widest minimal-tech">Slide Stack</span>
        </div>
        <div id="admin-slides-list" class="flex-grow overflow-y-auto p-4 space-y-3"></div>
        <div class="p-4 border-t border-slate-100">
          <button onclick="openNewSlideModal()" class="w-full py-3 bg-slate-900 text-white rounded-xl text-[10px] font-bold minimal-tech tracking-widest hover:bg-slate-800 shadow-lg flex items-center justify-center gap-2">
            <i data-lucide="plus" class="w-3 h-3"></i> NEW SLIDE
          </button>
        </div>
      </div>

      <!-- 右：詳細設定 & プレビュー -->
      <div class="flex-grow flex flex-col h-full overflow-hidden">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white/50">
          <h2 class="text-[11px] font-bold text-slate-800 tracking-widest uppercase minimal-tech">Global Control Studio</h2>
          <button onclick="toggleAdminPanel()" class="p-2 hover:bg-slate-100 rounded-full text-slate-400"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        
        <div class="flex-grow overflow-y-auto p-8 space-y-10 custom-scrollbar text-left">
          <section class="space-y-4">
            <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest minimal-tech flex items-center gap-2"><i data-lucide="settings-2" class="w-4 h-4"></i> Global Parameters</h3>
            <div class="grid grid-cols-2 gap-6 bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">
              <div class="space-y-1.5">
                <label class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Interval (Seconds)</label>
                <input type="number" id="global-duration" class="w-full px-4 py-2.5 rounded-xl bg-slate-50 border border-slate-100 text-slate-800 text-sm focus:outline-none">
              </div>
              <div class="space-y-1.5">
                <label class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Ticker Message</label>
                <input type="text" id="global-ticker-input" class="w-full px-4 py-2.5 rounded-xl bg-slate-50 border border-slate-100 text-slate-800 text-sm focus:outline-none">
              </div>
            </div>
          </section>

          <section class="space-y-4">
            <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest minimal-tech flex items-center gap-2"><i data-lucide="sparkles" class="w-4 h-4 text-indigo-400"></i> AI Link (Gemini)</h3>
            <div class="p-6 bg-indigo-50/20 border border-indigo-100/50 rounded-[32px] space-y-4">
              <p class="text-[11px] text-slate-500 leading-relaxed">Gemini APIキーを設定すると、AIが自動で「今日のみんなを応援する英語の名言」や「理科・歴史の面白雑学」などを自動生成します。</p>
              <input type="password" id="api-key-input" placeholder="AIzaSy..." class="w-full px-4 py-2.5 rounded-xl bg-white border border-indigo-100 text-slate-800 text-sm focus:outline-none shadow-inner">
              <button onclick="window.saveApiKey()" class="px-6 py-2 bg-indigo-600 text-white rounded-xl text-[9px] font-bold minimal-tech tracking-widest">CONNECT AI</button>
            </div>
          </section>
        </div>

        <div class="p-6 bg-slate-50 border-t border-slate-100 flex justify-between items-center">
          <button onclick="window.resetToDefaults()" class="text-rose-400 text-[10px] font-bold minimal-tech hover:text-rose-600 transition-all uppercase tracking-widest">Factory Reset</button>
          <p class="text-[9px] text-slate-300 minimal-tech tracking-[0.2em] uppercase">sei ohira portal // Miyagi OHIRA</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== VISUAL COMPOSER MODAL ==================== -->
  <div id="slide-creator-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xl z-[60] flex items-center justify-center p-4 hidden">
    <div class="w-full max-w-5xl bg-white rounded-[40px] shadow-2xl flex flex-col h-[90vh] overflow-hidden">
      <div class="p-8 border-b border-slate-50 flex justify-between items-center">
        <h3 class="text-[11px] font-bold text-slate-800 uppercase tracking-[0.3em] minimal-tech">Slide Visual Composer</h3>
        <button onclick="window.closeNewSlideModal()" class="p-2 bg-slate-50 hover:bg-slate-100 rounded-full text-slate-400 transition-all"><i data-lucide="x" class="w-5 h-5"></i></button>
      </div>

      <div class="flex-grow flex flex-row overflow-hidden">
        <!-- 左：設定 -->
        <div class="w-[380px] p-8 overflow-y-auto custom-scrollbar space-y-8 bg-slate-50/20 border-r border-slate-50 text-left">
          <div class="space-y-4">
            <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest minimal-tech">1. Layout Type</label>
            <div class="grid grid-cols-2 gap-3" id="layout-options">
              <button onclick="window.selectLayout('clock')" class="layout-btn layout-card p-4 rounded-2xl border-2 border-slate-100 bg-white text-left transition-all hover:border-indigo-200">
                <i data-lucide="clock" class="w-4 h-4 mb-2 text-slate-400"></i><div class="text-[10px] font-bold text-slate-700 uppercase">Clock</div>
              </button>
              <button onclick="window.selectLayout('schedule')" class="layout-btn layout-card p-4 rounded-2xl border-2 border-slate-100 bg-white text-left transition-all hover:border-indigo-200">
                <i data-lucide="list" class="w-4 h-4 mb-2 text-slate-400"></i><div class="text-[10px] font-bold text-slate-700 uppercase">Today's</div>
              </button>
              <button onclick="window.selectLayout('weekly')" class="layout-btn layout-card p-4 rounded-2xl border-2 border-slate-100 bg-white text-left transition-all hover:border-indigo-200">
                <i data-lucide="calendar" class="w-4 h-4 mb-2 text-slate-400"></i><div class="text-[10px] font-bold text-slate-700 uppercase">Weekly</div>
              </button>
              <button onclick="window.selectLayout('image')" class="layout-btn layout-card p-4 rounded-2xl border-2 border-slate-100 bg-white text-left transition-all hover:border-indigo-200">
                <i data-lucide="image" class="w-4 h-4 mb-2 text-slate-400"></i><div class="text-[10px] font-bold text-slate-700 uppercase">Gallery</div>
              </button>
            </div>
          </div>

          <div class="space-y-6" id="visual-editor-inputs">
            <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest minimal-tech">2. Slide Data</label>
            <div id="dynamic-visual-inputs" class="space-y-5"></div>
          </div>
        </div>

        <!-- 右：プレビュー -->
        <div class="flex-grow bg-slate-100/50 p-12 flex items-center justify-center overflow-hidden">
          <div class="relative w-[1280px] h-[720px] shadow-2xl rounded-[32px] overflow-hidden bg-white scale-[0.42] transform-gpu origin-center">
            <div id="live-designer-preview" class="w-full h-full relative"></div>
          </div>
        </div>
      </div>

      <div class="p-8 border-t border-slate-50 bg-white flex justify-end gap-4">
        <button onclick="window.closeNewSlideModal()" class="px-8 py-3 text-slate-400 text-[10px] font-bold tracking-widest minimal-tech">CANCEL</button>
        <button id="save-slide-btn" onclick="window.saveSlideData()" class="px-10 py-3 bg-slate-900 text-white rounded-2xl text-[10px] font-bold tracking-widest minimal-tech shadow-xl">SAVE & SYNC</button>
      </div>
    </div>
  </div>

  <!-- Firebase & System Module -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    const appId = 'sei-ohira-v55-ohira';
    const firebaseConfig = {
      apiKey: "AIzaSyAWN0wX9izOv5PqsRxMSC09lVSBGy_Oolk",
      authDomain: "sei-ohira.firebaseapp.com",
      projectId: "sei-ohira",
      storageBucket: "sei-ohira.firebasestorage.app",
      messagingSenderId: "615345211161",
      appId: "1:615345211161:web:f0c919a26d56e7ff2fa788",
      measurementId: "G-C3SYGNEN6C"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let slides = [];
    let tickerText = "【大衡中学校】おはようございます。本日は校内美化運動が実施されます。 🌿 | 読書旬間スタート。図書室でお待ちしています。 📚";
    let globalDuration = 8;
    let apiKey = localStorage.getItem(`${appId}-gemini-api-key`) || '';
    let currentSlideIndex = 0;
    let slideshowTimer = null;
    let isEditingMode = false;
    let activeDesignLayout = 'clock';
    let editingSlideId = null;

    const slidesDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'slides-list', 'default');
    const settingsDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'default');

    // ==================== INITIALIZATION ====================
    window.addEventListener('DOMContentLoaded', async () => {
      lucide.createIcons();
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('mode') === 'admin') {
        isEditingMode = true;
        document.getElementById('admin-mode-indicator').classList.remove('hidden');
      }

      await signInAnonymously(auth);
      onAuthStateChanged(auth, (user) => {
        if (user) {
          onSnapshot(slidesDocRef, (snap) => {
            if (snap.exists()) {
              slides = snap.data().slides || [];
              window.renderSlideshow();
              if (isEditingMode) window.renderAdminSlidesList();
            } else {
              // データベースが最初期で空の場合はダイアログを出さず、自動でデフォルトを書き込む
              window.autoInitializeDefaultData();
            }
          });
          onSnapshot(settingsDocRef, (snap) => {
            if (snap.exists()) {
              tickerText = snap.data().tickerText;
              globalDuration = snap.data().globalDuration;
            }
            window.applyTicker();
          });
        }
      });
      window.initSystemEngine();
    });

    window.initSystemEngine = () => {
      setInterval(() => {
        const now = new Date();
        const headerDate = document.getElementById('header-date');
        const headerTime = document.getElementById('header-time');
        if (headerDate) headerDate.innerText = now.toLocaleDateString('ja-JP', { year:'numeric', month:'2-digit', day:'2-digit', weekday:'short' }).toUpperCase();
        if (headerTime) headerTime.innerText = now.toLocaleTimeString('ja-JP', { hour12:false });
      }, 1000);
      window.initWeather();
    };

    window.initWeather = async () => {
      try {
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=38.47&longitude=140.88&current_weather=true&timezone=Asia%2FTokyo`);
        const data = await res.json();
        const weatherMap = { 0: "CLEAR", 1: "CLEAR", 2: "CLOUDY", 3: "CLOUDY", 45: "FOG", 61: "RAIN", 71: "SNOW", 95: "THUNDER" };
        const weatherText = document.getElementById('mini-weather-text');
        if (weatherText) weatherText.innerText = `OHIRA // ${Math.round(data.current_weather.temperature)}℃ ${weatherMap[data.current_weather.weathercode] || "CLEAR"}`;
      } catch (e) { document.getElementById('mini-weather-text').innerText = "OHIRA ONLINE"; }
    };

    // ==================== SLIDES RENDERER ====================
    window.renderSlideshow = () => {
      const container = document.getElementById('slides-container');
      if (!container) return;
      container.innerHTML = '';
      
      slides.forEach((slide, idx) => {
        const slideEl = document.createElement('div');
        slideEl.id = `slide-${idx}`;
        slideEl.className = `slide-transition absolute inset-0 w-full h-full p-16 flex flex-col justify-between rounded-[24px] satin-glass pointer-events-none`;
        
        let inner = '';
        if (slide.type === 'clock') {
          inner = `
            <div class="w-full flex justify-between items-start opacity-50"><span class="text-xs font-bold tracking-widest minimal-tech">PORTAL INFOMETRY</span><i data-lucide="clock" class="w-5 h-5"></i></div>
            <div class="my-auto text-center space-y-6">
              <h1 id="live-clock-${idx}" class="text-[12rem] font-extrabold text-slate-800 tracking-tighter serif-letterpress leading-none">00:00</h1>
              <p class="text-2xl text-slate-500 font-light max-w-4xl mx-auto">${slide.content}</p>
            </div>
            <div class="w-full text-center text-[10px] font-bold opacity-30 minimal-tech uppercase tracking-widest">${slide.title}</div>
          `;
          setInterval(() => {
            const el = document.getElementById(`live-clock-${idx}`);
            if (el) el.innerText = new Date().toLocaleTimeString('ja-JP', { hour12:false, hour:'2-digit', minute:'2-digit' });
          }, 1000);
        } else if (slide.type === 'schedule') {
          const lines = slide.content.split('\n').map(l => l.split('|'));
          const list = lines.map(p => `
            <div class="flex items-center gap-10 border-b border-black/[0.03] pb-4">
              <span class="text-2xl font-bold text-slate-300 minimal-tech w-32 uppercase">${p[0]?.trim() || '--:--'}</span>
              <span class="text-3xl font-medium text-slate-700">${p[1]?.trim() || ''}</span>
            </div>
          `).join('');
          inner = `
            <div class="w-full flex justify-between opacity-40 mb-6"><span class="text-xs font-bold tracking-widest minimal-tech uppercase">Today's Schedule</span><i data-lucide="list" class="w-5 h-5"></i></div>
            <div class="flex-grow flex flex-col max-w-4xl mx-auto w-full">
              <h2 class="text-4xl font-black mb-10 border-b-4 border-slate-900 pb-4 uppercase tracking-widest minimal-tech text-left">${slide.title}</h2>
              <div class="space-y-6 custom-scrollbar overflow-y-auto pr-4">${list}</div>
            </div>
          `;
        } else if (slide.type === 'weekly') {
          const lines = slide.content.split('\n').map(l => l.split('|'));
          const cards = lines.map(p => `
            <div class="flex-1 min-w-[160px] flex flex-col p-6 bg-white/30 border border-white/60 rounded-3xl text-center shadow-sm">
              <span class="text-sm font-bold text-slate-400 uppercase tracking-widest minimal-tech border-b border-black/[0.04] pb-2 mb-3">${p[0]?.trim() || 'Day'}</span>
              <span class="text-lg font-semibold text-slate-700 leading-snug">${p[1]?.trim() || ''}</span>
            </div>
          `).join('');
          inner = `
            <div class="w-full flex justify-between opacity-40 mb-6"><span class="text-xs font-bold tracking-widest minimal-tech uppercase">Weekly Overview</span><i data-lucide="calendar" class="w-5 h-5"></i></div>
            <div class="flex-grow flex flex-col w-full text-center">
              <h2 class="text-3xl font-black mb-12 uppercase tracking-widest minimal-tech">${slide.title}</h2>
              <div class="flex flex-row gap-4 justify-center items-stretch">${cards}</div>
            </div>
          `;
        } else if (slide.type === 'image') {
          inner = `
            <div class="w-full h-full flex items-center gap-16">
              <div class="w-1/2 h-full rounded-[40px] overflow-hidden shadow-2xl border-4 border-white bg-slate-100">
                <img src="${slide.content_img}" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=800'">
              </div>
              <div class="w-1/2 space-y-8 text-left">
                <span class="text-xs font-bold text-indigo-500 tracking-[0.4em] minimal-tech uppercase">Announcement</span>
                <h2 class="text-6xl font-black text-slate-800 leading-tight">${slide.title}</h2>
                <div class="h-2 w-20 bg-slate-900 rounded-full"></div>
                <p class="text-2xl text-slate-500 font-light leading-relaxed">${slide.content}</p>
              </div>
            </div>
          `;
        }
        slideEl.innerHTML = inner;
        container.appendChild(slideEl);
      });
      lucide.createIcons();
      window.showSlide(currentSlideIndex);
    };

    window.showSlide = (index) => {
      if (!slides.length) return;
      document.querySelectorAll('.slide-transition').forEach(el => el.classList.remove('active'));
      const active = document.getElementById(`slide-${index}`);
      if (active) active.classList.add('active');
      const duration = (slides[index].duration || globalDuration) * 1000;
      const bar = document.getElementById('slide-progress');
      if (bar) {
        bar.style.transition = 'none'; bar.style.width = '0%';
        setTimeout(() => { bar.style.transition = `width ${duration}ms linear`; bar.style.width = '100%'; }, 50);
      }
    };

    window.startSlideshowLoop = () => {
      if (slideshowTimer) clearTimeout(slideshowTimer);
      if (slides.length <= 1) return;
      slideshowTimer = setTimeout(() => {
        currentSlideIndex = (currentSlideIndex + 1) % slides.length;
        window.showSlide(currentSlideIndex);
        window.startSlideshowLoop();
      }, (slides[currentSlideIndex].duration || globalDuration) * 1000);
    };

    // ==================== VISUAL DESIGNER ====================
    window.selectLayout = (type) => {
      activeDesignLayout = type;
      document.querySelectorAll('.layout-btn').forEach(el => el.classList.remove('selected'));
      const activeBtn = Array.from(document.querySelectorAll('.layout-btn')).find(el => el.getAttribute('onclick').includes(`'${type}'`));
      if (activeBtn) activeBtn.classList.add('selected');
      window.updateDesignerInputs();
    };

    window.updateDesignerInputs = () => {
      const container = document.getElementById('dynamic-visual-inputs');
      if (!container) return;
      container.innerHTML = '';
      window.tempUploadedImageBase64 = "";

      let commonHTML = `<div class="space-y-2"><label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Main Title</label><input type="text" id="ds-title" oninput="window.updateLivePreview()" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-indigo-400 outline-none"></div>`;
      
      let specificHTML = '';
      if (activeDesignLayout === 'clock') {
        specificHTML = `<div class="space-y-2"><label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Message</label><textarea id="ds-content" oninput="window.updateLivePreview()" rows="3" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-indigo-400 outline-none">おはようございます。</textarea></div>`;
      } else if (activeDesignLayout === 'schedule' || activeDesignLayout === 'weekly') {
        specificHTML = `<div class="space-y-2"><label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">List Data ( Label | Content )</label><textarea id="ds-content" oninput="window.updateLivePreview()" rows="6" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm font-mono focus:border-indigo-400 outline-none"></textarea></div>`;
      } else if (activeDesignLayout === 'image') {
        specificHTML = `
          <div class="space-y-2"><label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Drop Image</label><div id="ds-drop-zone" onclick="window.triggerImageFileSelect()" ondragover="window.handleImageDragOver(event)" ondrop="window.handleImageDrop(event)" class="w-full h-32 border-2 border-dashed border-slate-200 rounded-2xl flex items-center justify-center bg-white cursor-pointer hover:border-indigo-300 transition-all text-slate-400 flex-col gap-1"><i data-lucide="image" class="w-6 h-6"></i><span class="text-[10px] font-bold uppercase">Click or Drag</span><input type="file" id="ds-image-file" class="hidden" onchange="window.handleImageSelect(event)" accept="image/*"></div></div>
          <div class="space-y-2"><label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Description</label><textarea id="ds-content" oninput="window.updateLivePreview()" rows="3" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm outline-none"></textarea></div>
        `;
      }
      container.innerHTML = commonHTML + specificHTML;
      lucide.createIcons();
      window.updateLivePreview();
    };

    window.updateLivePreview = () => {
      const preview = document.getElementById('live-designer-preview');
      if (!preview) return;
      const title = document.getElementById('ds-title')?.value || 'TITLE';
      const content = document.getElementById('ds-content')?.value || '';
      const finalImg = window.tempUploadedImageBase64 || 'https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=800';

      let html = '';
      if (activeDesignLayout === 'clock') {
        html = `<div class="w-full h-full p-20 flex flex-col justify-between items-center text-center"><span class="text-xs font-bold tracking-[0.4em] text-slate-300 minimal-tech">PREVIEW CHRONO</span><div class="my-auto space-y-6"><h1 class="text-[13rem] font-extrabold text-slate-800 tracking-tighter leading-none serif-letterpress">12:34</h1><p class="text-3xl text-slate-500 font-light">${content}</p></div><span class="text-xs font-bold tracking-[0.3em] text-slate-400 uppercase minimal-tech">${title}</span></div>`;
      } else if (activeDesignLayout === 'schedule') {
        const rows = content.split('\n').map(l => l.split('|')).map(p => `<div class="flex items-center gap-12 border-b border-black/[0.03] pb-6 last:border-0"><span class="text-3xl font-bold text-slate-300 minimal-tech w-40">${p[0]?.trim() || '--:--'}</span><span class="text-4xl font-semibold text-slate-700">${p[1]?.trim() || ''}</span></div>`).join('');
        html = `<div class="w-full h-full p-20 flex flex-col justify-between"><div class="w-full flex justify-between mb-8 opacity-40"><span class="text-xs font-bold tracking-widest minimal-tech">STATION DATA</span><i data-lucide="calendar" class="w-5 h-5"></i></div><div class="flex-grow flex flex-col max-w-4xl mx-auto w-full"><h2 class="text-4xl font-black mb-10 border-b-4 border-slate-900 pb-4 uppercase tracking-widest minimal-tech">${title}</h2><div class="space-y-6">${listHTML}</div></div><div class="w-full text-center text-[8px] text-slate-400 font-bold uppercase tracking-[0.4em] minimal-tech">Sync Status Active</div></div>`;
      } else if (activeDesignLayout === 'weekly') {
        const cards = content.split('\n').map(l => l.split('|')).map(p => `<div class="flex-1 flex flex-col p-8 bg-white/40 border border-slate-100 rounded-[32px] text-center shadow-sm"><span class="text-lg font-bold text-slate-400 uppercase tracking-widest minimal-tech border-b border-black/[0.04] pb-3 mb-4">${p[0]?.trim() || '曜日'}</span><span class="text-2xl font-bold text-slate-700">${p[1]?.trim() || ''}</span></div>`).join('');
        html = `<div class="w-full h-full p-20 flex flex-col text-center"><h2 class="text-5xl font-black mb-16 uppercase tracking-widest minimal-tech">${title}</h2><div class="flex flex-row gap-6 justify-center items-stretch">${cards}</div></div>`;
      } else if (activeDesignLayout === 'image') {
        html = `<div class="w-full h-full flex items-center p-20 gap-20"><div class="w-1/2 h-full rounded-[48px] overflow-hidden shadow-2xl border-8 border-white bg-slate-100"><img src="${finalImg}" class="w-full h-full object-cover"></div><div class="w-1/2 space-y-8 text-left"><span class="text-xs font-bold text-indigo-500 tracking-[0.4em] minimal-tech uppercase">Announcement</span><h2 class="text-7xl font-black text-slate-800 leading-tight">${title}</h2><div class="h-2 w-24 bg-slate-900 rounded-full"></div><p class="text-3xl text-slate-500 font-light leading-relaxed">${content}</p></div></div>`;
      }
      preview.innerHTML = html;
      lucide.createIcons();
    };

    // ==================== EDIT & SAVE LOGIC ====================
    window.openEditSlide = (idx) => {
      const s = slides[idx];
      editingSlideId = s.id;
      window.openNewSlideModal();
      window.selectLayout(s.type);
      
      setTimeout(() => {
        document.getElementById('ds-title').value = s.title || '';
        document.getElementById('ds-content').value = s.content || '';
        if (s.type === 'image') {
           window.tempUploadedImageBase64 = s.content_img || '';
           const inner = document.getElementById('ds-upload-inner');
           if (inner && s.content_img) inner.innerHTML = `<img src="${s.content_img}" class="w-full h-full object-cover rounded-xl">`;
        }
        window.updateLivePreview();
      }, 50);
    };

    window.saveSlideData = () => {
      const title = document.getElementById('ds-title').value;
      const content = document.getElementById('ds-content')?.value || "";
      const content_img = window.tempUploadedImageBase64 || "";

      if (editingSlideId) {
        const idx = slides.findIndex(s => s.id === editingSlideId);
        if (idx !== -1) {
          slides[idx] = { ...slides[idx], type: activeDesignLayout, title, content, content_img };
        }
      } else {
        slides.push({ id: "s-"+Date.now(), type: activeDesignLayout, title, content, content_img, duration: 8 });
      }

      setDoc(slidesDocRef, { slides }).then(() => {
        window.closeNewSlideModal();
        window.showAlert("SUCCESSFULLY SYNCED");
      });
    };

    window.deleteSlide = (idx) => {
      if (confirm("スライドを削除してもよろしいですか？")) {
        slides.splice(idx, 1);
        setDoc(slidesDocRef, { slides });
      }
    };

    // ==================== UI CONTROLS ====================
    window.toggleAdminPanel = () => document.getElementById('admin-panel').classList.toggle('translate-x-full');
    window.openAdminPanelDirectly = () => window.toggleAdminPanel();
    window.openNewSlideModal = () => { editingSlideId = null; window.tempUploadedImageBase64 = ""; document.getElementById('slide-creator-modal').classList.remove('hidden'); window.selectLayout('clock'); };
    window.closeNewSlideModal = () => document.getElementById('slide-creator-modal').classList.add('hidden');
    
    window.saveApiKey = () => { apiKey = document.getElementById('api-key-input').value; localStorage.setItem(`${appId}-gemini-api-key`, apiKey); window.showAlert("AI LINK SECURED"); };
    window.saveGlobalSettings = () => {
       globalDuration = parseInt(document.getElementById('global-duration').value) || 8;
       tickerText = document.getElementById('global-ticker-input').value;
       setDoc(settingsDocRef, { tickerText, globalDuration }).then(() => window.showAlert("STUDIO SYNCED"));
    };

    window.applyTicker = () => { const el = document.getElementById('ticker-content'); if (el) el.innerText = `${tickerText}   +++   ${tickerText}`; };
    window.showAlert = (msg) => { const el = document.getElementById('custom-alert'); document.getElementById('custom-alert-text').innerText = msg; el.classList.remove('-translate-y-24'); setTimeout(() => el.classList.add('-translate-y-24'), 3000); };

    window.renderAdminSlidesList = () => {
      const container = document.getElementById('admin-slides-list');
      if (!container) return;
      container.innerHTML = slides.map((s, i) => `
        <div class="p-4 bg-white rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between group">
          <div class="overflow-hidden">
            <p class="text-[8px] font-bold text-indigo-400 uppercase minimal-tech">${s.type}</p>
            <p class="text-xs font-bold text-slate-700 truncate">${s.title}</p>
          </div>
          <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-all">
            <button onclick="window.openEditSlide(${i})" class="p-1.5 text-slate-400 hover:text-indigo-600"><i data-lucide="edit-2" class="w-3.5 h-3.5"></i></button>
            <button onclick="window.deleteSlide(${i})" class="p-1.5 text-slate-400 hover:text-rose-500"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    };

    // サイレント初期化処理 (データベースが空の時は確認を出さずに書き込む)
    window.autoInitializeDefaultData = () => {
      const def = [
        { id:"s1", type:"clock", title:"WELCOME", content:"大衡中学校デジタルサイネージへようこそ。今日も新しい発見を楽しもう！", duration:8 },
        { id:"s2", type:"weekly", title:"THIS WEEK", content:"月|全校朝会\n火|ノー部活デー\n水|実力テスト\n木|委員会\n金|英検", duration:10 }
      ];
      setDoc(slidesDocRef, { slides: def });
      setDoc(settingsDocRef, { tickerText: "【大衡中学校】おはようございます。本日は校内美化運動が実施されます。 🌿 | 読書旬間スタート。図書室でお待ちしています。 📚", globalDuration: 8 });
    };

    window.resetToDefaults = () => {
      if (confirm("全てのデータを消去し、大衡中学校の初期状態に戻しますか？")) {
        window.autoInitializeDefaultData();
      }
    };

    // 画像処理（自動圧縮）
    window.triggerImageFileSelect = () => document.getElementById('ds-image-file').click();
    window.handleImageSelect = (e) => { const f = e.target.files[0]; if (f) window.processUploadedImage(f); };
    window.handleImageDragOver = (e) => { e.preventDefault(); e.currentTarget.classList.add('border-indigo-400'); };
    window.handleImageDrop = (e) => { e.preventDefault(); e.currentTarget.classList.remove('border-indigo-400'); const f = e.dataTransfer.files[0]; if (f && f.type.startsWith('image/')) window.processUploadedImage(f); };

    window.processUploadedImage = (file) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX_W = 800;
          let w = img.width, h = img.height;
          if (w > MAX_W) { h *= MAX_W / w; w = MAX_W; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          window.tempUploadedImageBase64 = canvas.toDataURL('image/jpeg', 0.7);
          const inner = document.getElementById('ds-upload-inner');
          if (inner) inner.innerHTML = `<img src="${window.tempUploadedImageBase64}" class="w-full h-full object-cover rounded-xl">`;
          window.updateLivePreview();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    };

    window.tempUploadedImageBase64 = "";
    window.startSlideshowLoop();
  </script>
</body>
</html>
