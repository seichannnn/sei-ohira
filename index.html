<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aesthetic Signage OS - Ohira Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600&family=Noto+Sans+JP:wght@100;300;400;500;700&family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; overflow: hidden; background-color: #f6f8fa; color: #1e293b; }
    .serif-letterpress { font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; letter-spacing: -0.04em; }
    .minimal-tech { font-family: 'Space Grotesk', sans-serif; letter-spacing: 0.2em; }
    .slide-transition { opacity: 0; transform: scale(0.99) translateY(4px); transition: opacity 1.8s cubic-bezier(0.16, 1, 0.3, 1), transform 1.8s cubic-bezier(0.16, 1, 0.3, 1); }
    .slide-transition.active { opacity: 1; transform: scale(1) translateY(0); }
    .satin-glass { background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(40px); border: 1px rgba(255, 255, 255, 0.6) solid; box-shadow: 0 20px 60px rgba(15, 23, 42, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.8); }
    @keyframes slow-ambient { 0% { transform: translate(0px, 0px) scale(1); } 50% { transform: translate(30px, -15px) scale(1.05); } 100% { transform: translate(0px, 0px) scale(1); } }
    .ambient-aurora { animation: slow-ambient 35s infinite alternate ease-in-out; }
    .progress-bar-fill { width: 0%; transition: width linear; }
    @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-50%, 0, 0); } }
    .ticker-content { display: inline-block; white-space: nowrap; animation: ticker 60s linear infinite; }
    .preview-canvas { transform: scale(0.4); transform-origin: top left; pointer-events: none; }
    .layout-card.selected { border-color: #6366f1; background-color: rgba(99, 102, 241, 0.05); }
  </style>
</head>
<body class="w-screen h-screen flex flex-col justify-between relative select-none p-6 md:p-10">

  <!-- ==================== AMBIENT BACKGROUND ==================== -->
  <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden bg-[#f6f8fa]">
    <div class="ambient-aurora absolute top-[-20%] left-[-15%] w-[80vw] h-[80vh] bg-gradient-to-tr from-blue-200/30 via-indigo-100/20 to-transparent rounded-full filter blur-[120px]"></div>
    <div class="ambient-aurora absolute bottom-[-20%] right-[-15%] w-[80vw] h-[80vh] bg-gradient-to-tr from-pink-100/30 via-purple-100/20 to-transparent rounded-full filter blur-[120px]" style="animation-delay: -10s;"></div>
  </div>

  <!-- ==================== MINIMAL HEADER ==================== -->
  <header class="w-full px-8 py-4 flex justify-between items-center z-10 satin-glass rounded-[20px] mb-6 shadow-sm">
    <div class="flex items-center gap-3">
      <span class="w-1.5 h-1.5 rounded-full bg-slate-500/60 animate-pulse"></span>
      <div class="flex flex-col text-left">
        <span class="text-[9px] font-bold tracking-[0.3em] text-slate-400 uppercase minimal-tech">OHIRA CAMPUS</span>
        <span class="text-xs font-light text-slate-600 uppercase">Signage OS Portal <span class="text-[9px] text-slate-400 ml-1">v5.0</span></span>
      </div>
    </div>
    <div class="flex items-center gap-8">
      <div id="mini-weather" class="flex items-center gap-2 text-[11px] text-slate-500 font-light">
        <span id="mini-weather-text" class="minimal-tech uppercase">OHIRA METEO LOADING</span>
      </div>
      <div class="text-right border-l border-slate-200 pl-6">
        <p id="header-date" class="text-[8px] text-slate-400 font-semibold uppercase tracking-widest minimal-tech"></p>
        <p id="header-time" class="text-base font-light text-slate-700 minimal-tech tracking-wider"></p>
      </div>
      <button id="admin-mode-indicator" onclick="openAdminPanelDirectly()" class="hidden px-4 py-2 bg-slate-900 text-white hover:bg-slate-800 rounded-xl transition-all text-[10px] font-bold minimal-tech shadow-md tracking-widest">
        DESIGNER STUDIO
      </button>
    </div>
  </header>

  <!-- ==================== DISPLAY CANVAS ==================== -->
  <main class="flex-grow w-full relative overflow-hidden z-10 flex items-center justify-center mb-6">
    <div id="slides-container" class="w-full h-full relative"></div>
    <div class="absolute bottom-0 left-0 right-0 h-[2px] bg-black/[0.02] overflow-hidden z-20">
      <div id="slide-progress" class="h-full bg-slate-400 progress-bar-fill"></div>
    </div>
  </main>

  <!-- ==================== MARQUEE FOOTER ==================== -->
  <footer class="w-full h-10 z-10 satin-glass rounded-[16px] overflow-hidden flex items-center px-6">
    <div class="text-[9px] font-bold text-slate-400 tracking-widest uppercase shrink-0 mr-6 flex items-center minimal-tech">宮城 大衡村 // UPDATES</div>
    <div class="ticker-wrap flex-grow h-full flex items-center text-slate-600 font-light text-xs tracking-widest uppercase overflow-hidden">
      <div id="ticker-content" class="ticker-content minimal-tech"></div>
    </div>
  </footer>

  <!-- ==================== VISUAL DESIGNER DRAWER ==================== -->
  <div id="admin-panel" class="fixed inset-0 bg-white/95 backdrop-blur-3xl z-50 flex justify-end transform translate-x-full transition-transform duration-500 ease-[cubic-bezier(0.16,1,0.3,1)]">
    <div class="w-full max-w-4xl bg-[#fafafa] h-full shadow-2xl flex flex-row border-l border-slate-200">
      
      <!-- 左：スライドスタック管理 -->
      <div class="w-64 border-r border-slate-100 flex flex-col h-full bg-slate-50/50">
        <div class="p-6 border-b border-slate-100 flex items-center gap-2">
          <i data-lucide="layers" class="w-4 h-4 text-slate-400"></i>
          <span class="text-[10px] font-bold text-slate-800 uppercase tracking-widest minimal-tech">Slide Stack</span>
        </div>
        <div id="admin-slides-list" class="flex-grow overflow-y-auto p-4 space-y-3"></div>
        <div class="p-4 border-t border-slate-100">
          <button onclick="openNewSlideModal()" class="w-full py-3 bg-slate-900 text-white rounded-xl text-[10px] font-bold minimal-tech tracking-widest hover:bg-slate-800 shadow-lg flex items-center justify-center gap-2">
            <i data-lucide="plus" class="w-3 h-3"></i> NEW SLIDE
          </button>
        </div>
      </div>

      <!-- 右：詳細設定 & プレビュー -->
      <div class="flex-grow flex flex-col h-full overflow-hidden">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white/50">
          <h2 class="text-[11px] font-bold text-slate-800 tracking-widest uppercase minimal-tech">Global Control Studio</h2>
          <button onclick="toggleAdminPanel()" class="p-2 hover:bg-slate-100 rounded-full text-slate-400"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        
        <div class="flex-grow overflow-y-auto p-8 space-y-10">
          <section class="space-y-4">
            <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest minimal-tech flex items-center gap-2"><i data-lucide="globe" class="w-4 h-4"></i> Display Parameters</h3>
            <div class="grid grid-cols-2 gap-6 bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
              <div class="space-y-1.5 text-left">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Interval (Sec)</label>
                <input type="number" id="global-duration" value="8" class="w-full px-4 py-2.5 rounded-xl bg-slate-50 border border-slate-100 text-slate-800 text-sm focus:outline-none">
              </div>
              <div class="space-y-1.5 text-left">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Footer News Ticker</label>
                <textarea id="global-ticker-text" rows="1" class="w-full px-4 py-2.5 rounded-xl bg-slate-50 border border-slate-100 text-slate-800 text-sm focus:outline-none resize-none"></textarea>
              </div>
              <div class="col-span-2 flex justify-end">
                <button onclick="saveGlobalSettings()" class="px-6 py-2.5 bg-slate-900 text-white text-[10px] font-bold rounded-xl minimal-tech tracking-widest hover:bg-slate-800">APPLY CHANGES</button>
              </div>
            </div>
          </section>

          <section class="space-y-4">
            <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest minimal-tech flex items-center gap-2"><i data-lucide="sparkles" class="w-4 h-4"></i> AI Link (Gemini)</h3>
            <div class="p-6 bg-indigo-50/30 border border-indigo-100/50 rounded-3xl space-y-4">
              <p class="text-[11px] text-slate-500 leading-relaxed text-left">Gemini APIキーを設定すると、AIが自動で「今日のみんなを応援する英語の名言」や「理科・歴史の面白雑学」などを自動生成します。</p>
              <div class="flex gap-2">
                <input type="password" id="api-key-input" placeholder="AIzaSy..." class="flex-grow px-4 py-2.5 rounded-xl bg-white border border-indigo-100 text-slate-800 text-sm focus:outline-none">
                <button onclick="saveApiKey()" class="px-6 py-2.5 bg-indigo-600 text-white hover:bg-indigo-700 rounded-xl text-[10px] font-bold minimal-tech tracking-widest">SAVE KEY</button>
              </div>
            </div>
          </section>
        </div>

        <div class="p-6 bg-slate-50 border-t border-slate-100 flex justify-between items-center">
          <button onclick="resetToDefaults()" class="text-rose-500 text-[10px] font-bold minimal-tech tracking-widest hover:underline">HARD RESET SYSTEM</button>
          <p class="text-[9px] text-slate-400 minimal-tech tracking-widest uppercase">OHIRA JUNIOR HIGH SCHOOL // SYNCED</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== VISUAL DESIGNER MODAL ==================== -->
  <div id="slide-creator-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xl z-[60] flex items-center justify-center p-4 hidden">
    <div class="w-full max-w-5xl bg-white rounded-[40px] shadow-2xl flex flex-col h-[90vh] overflow-hidden">
      <div class="p-8 border-b border-slate-50 flex justify-between items-center">
        <div class="flex flex-col text-left">
          <span class="text-[10px] font-bold text-indigo-500 uppercase tracking-[0.3em] minimal-tech">New Asset</span>
          <h3 class="text-xl font-bold text-slate-800 tracking-tight">Slide Visual Designer</h3>
        </div>
        <button onclick="closeNewSlideModal()" class="p-3 bg-slate-50 hover:bg-slate-100 rounded-full text-slate-400 transition-all"><i data-lucide="x" class="w-6 h-6"></i></button>
      </div>

      <div class="flex-grow flex flex-row overflow-hidden">
        <!-- デザイナ左：設定 -->
        <div class="w-2/5 p-8 overflow-y-auto space-y-8 bg-slate-50/30 border-r border-slate-50">
          <div class="space-y-4 text-left">
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest minimal-tech">1. Select Layout</label>
            <div class="grid grid-cols-2 gap-3" id="layout-options">
              <button onclick="selectLayout('clock')" class="layout-card p-4 rounded-2xl border-2 border-slate-100 bg-white text-left transition-all hover:border-indigo-200">
                <i data-lucide="clock" class="w-5 h-5 mb-2 text-slate-400"></i>
                <div class="text-xs font-bold text-slate-800">Simple Clock</div>
              </button>
              <button onclick="selectLayout('schedule')" class="layout-card p-4 rounded-2xl border-2 border-slate-100 bg-white text-left transition-all hover:border-indigo-200">
                <i data-lucide="list" class="w-5 h-5 mb-2 text-slate-400"></i>
                <div class="text-xs font-bold text-slate-800">Today's List</div>
              </button>
              <button onclick="selectLayout('weekly')" class="layout-card p-4 rounded-2xl border-2 border-slate-100 bg-white text-left transition-all hover:border-indigo-200">
                <i data-lucide="calendar" class="w-5 h-5 mb-2 text-slate-400"></i>
                <div class="text-xs font-bold text-slate-800">Weekly View</div>
              </button>
              <button onclick="selectLayout('image')" class="layout-card p-4 rounded-2xl border-2 border-slate-100 bg-white text-left transition-all hover:border-indigo-200">
                <i data-lucide="image" class="w-5 h-5 mb-2 text-slate-400"></i>
                <div class="text-xs font-bold text-slate-800">Image & Text</div>
              </button>
            </div>
          </div>

          <div class="space-y-4 text-left" id="visual-editor-inputs">
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest minimal-tech">2. Content Entry</label>
            <div class="space-y-4" id="dynamic-visual-inputs"></div>
          </div>
        </div>

        <!-- デザイナ右：ライブプレビュー -->
        <div class="flex-grow bg-slate-100/50 p-10 flex items-center justify-center overflow-hidden">
          <div class="relative w-[1280px] h-[720px] shadow-2xl rounded-[32px] overflow-hidden bg-white scale-[0.45] transform-gpu origin-center">
            <div id="live-designer-preview" class="w-full h-full relative"></div>
          </div>
        </div>
      </div>

      <div class="p-8 border-t border-slate-50 bg-white flex justify-end gap-4">
        <button onclick="closeNewSlideModal()" class="px-4 py-2 bg-slate-200 hover:bg-slate-350 text-slate-300 rounded-xl text-sm font-bold">キャンセル</button>
        <button onclick="addNewSlide()" class="px-5 py-2 bg-slate-900 text-white rounded-xl text-sm font-bold">スライドを追加</button>
      </div>
    </div>
  </div>

  <!-- ==================== ALERT COMPONENT ==================== -->
  <div id="custom-alert" class="fixed top-8 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 bg-slate-900 text-white rounded-full font-bold shadow-2xl flex items-center gap-2 transform -translate-y-24 transition-transform duration-300 pointer-events-none text-xs tracking-widest minimal-tech">
    <i data-lucide="check" class="w-4 h-4 text-emerald-400"></i>
    <span id="custom-alert-text">MESSAGE</span>
  </div>

  <!-- Firebase Scripts (Vercelでのリアルタイムクラウド同期用) -->
  <script type="module">
    // Firebase CDN Imports
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // --- FIREBASE & CLOUD STORAGE CONFIGURATION ---
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'miyagi-minimal-signage-v45';
    
    // 大衡中学校用に提供された本番のFirebase設定
    const firebaseConfig = {
      apiKey: "AIzaSyAWN0wX9izOv5PqsRxMSC09lVSBGy_Oolk",
      authDomain: "sei-ohira.firebaseapp.com",
      projectId: "sei-ohira",
      storageBucket: "sei-ohira.firebasestorage.app",
      messagingSenderId: "615345211161",
      appId: "1:615345211161:web:f0c919a26d56e7ff2fa788",
      measurementId: "G-C3SYGNEN6C"
    };

    // Firebaseの初期化
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // グローバル状態
    let slides = [];
    let tickerText = "【大衡中学校・連絡】本日は美化委員による校内美化運動が実施されます。綺麗な学習環境を維持しましょう！ 🌿 | 【図書室】冬休み前の図書特別貸出（1人5冊まで）がスタート。お気に入りの1冊を探してみよう！ 📚";
    let globalDuration = 8;
    let globalTransition = 'fade';
    let apiKey = localStorage.getItem(`${appId}-gemini-api-key`) || '';
    let currentSlideIndex = 0;
    let slideshowTimer = null;
    let isEditingMode = false;
    let activeDesignLayout = 'clock';

    // --- AUTHENTICATION BEFORE QUERIES (RULE 3) ---
    const initAuth = async () => {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          try {
            // 本番プロジェクトの構成と不一致の場合は匿名ログインにフォールバックする
            await signInWithCustomToken(auth, __initial_auth_token);
          } catch (tokenErr) {
            console.warn("Custom token failed. Falling back to anonymous auth:", tokenErr);
            await signInAnonymously(auth);
          }
        } else {
          await signInAnonymously(auth);
        }
      } catch (err) {
        console.error("Firebase auth failed:", err);
      }
    };

    // --- CLOUD REAL-TIME DATABASE SYNC ---
    // Firestore Public Path Rules (RULE 1に適合)
    const slidesDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'slides-list', 'default');
    const settingsDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'default');

    // データベースから設定を読み込み & リアルタイムバインド
    const startRealtimeDatabaseSync = (user) => {
      if (!user) return;

      // 1. スライドリストのリアルタイム監視
      onSnapshot(slidesDocRef, (docSnapshot) => {
        if (docSnapshot.exists()) {
          slides = docSnapshot.data().slides || [];
        } else {
          // ドキュメントが存在しない場合はデフォルト値を保存
          slides = getInitialDefaultSlides();
          setDoc(slidesDocRef, { slides });
        }
        renderSlideshow();
        if (isEditingMode) renderAdminSlidesList();
      }, (error) => {
        console.error("Error fetching slides from Firestore:", error);
      });

      // 2. 基本設定（ティッカー文、スライド秒数）のリアルタイム監視
      onSnapshot(settingsDocRef, (docSnapshot) => {
        if (docSnapshot.exists()) {
          const data = docSnapshot.data();
          tickerText = data.tickerText || tickerText;
          globalDuration = data.globalDuration || globalDuration;
        } else {
          // デフォルトをサーバーに書き込み
          setDoc(settingsDocRef, { tickerText, globalDuration });
        }
        applyTicker();
        startSlideshowLoop();
      }, (error) => {
        console.error("Error fetching settings from Firestore:", error);
      });
    };

    // 宮城県大衡村（大衡中学校）に最適化したデフォルトスライドデータ
    function getInitialDefaultSlides() {
      return [
        {
          id: "slide-1",
          type: "clock",
          title: "MORNING THOUGHT",
          content: "「考えることをやめないこと」それが未来を創る第一歩。今日も新しい視点を見つけよう。",
          duration: 8,
          align: "center"
        },
        {
          id: "slide-schedule",
          type: "schedule",
          title: "TODAY'S TIMELINE",
          content: "08:30 | 朝礼・連絡事項\n08:45 | 1限目：大衡学サイエンス\n10:40 | 2限目：野外自然フィールドワーク\n12:15 | ランチタイム & 万葉読書\n13:30 | 共同創作プログラミング\n15:00 | 片付け & 部活動開始",
          duration: 10,
          align: "left"
        },
        {
          id: "slide-2",
          type: "image",
          title: "DISCOVER PORTALS",
          content: "https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=1200&auto=format&fit=crop",
          subtext: "図書室には、あなたの常識を覆す物語がひっそりと眠っています。休み時間にゲートを開けてみましょう。",
          duration: 10,
          align: "left"
        },
        {
          id: "slide-3",
          type: "weather",
          title: "OHIRA FORECAST",
          city: "Ohira", // 大衡村
          duration: 8,
          align: "center"
        },
        {
          id: "slide-4",
          type: "countdown",
          title: "CREATIVE FESTIVAL",
          content: "2026-10-15 09:00",
          subtext: "限界なんてない。みんなで極上のアートと体験を創造しよう。",
          duration: 8,
          align: "center"
        }
      ];
    }

    // --- LIFE CYCLE BOOT ---
    window.addEventListener('DOMContentLoaded', async () => {
      lucide.createIcons();
      initTime();
      initWeatherMini();

      // 管理者パラメータのURL判定
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('mode') === 'admin') {
        isEditingMode = true;
        const adminIndicator = document.getElementById('admin-mode-indicator');
        if (adminIndicator) adminIndicator.classList.remove('hidden');
      }

      // 認証の初期化をしてからデータベースとの同期を開始
      await initAuth();
      onAuthStateChanged(auth, (user) => {
        if (user) {
          startRealtimeDatabaseSync(user);
        }
      });
    });

    // --- SYSTEM CLOCK ---
    function initTime() {
      setInterval(() => {
        const now = new Date();
        const headerDate = document.getElementById('header-date');
        const headerTime = document.getElementById('header-time');
        if (headerDate) headerDate.innerText = now.toLocaleDateString('ja-JP', { year:'numeric', month:'2-digit', day:'2-digit', weekday:'short' }).toUpperCase();
        if (headerTime) headerTime.innerText = now.toLocaleTimeString('ja-JP', { hour12:false });
      }, 1000);
    }

    // --- WEATHER SYSTEM (MIYAGI / OHIRA OPTIMIZED) ---
    async function initWeatherMini() {
      const weatherTextEl = document.getElementById('mini-weather-text');
      if (!weatherTextEl) return;
      try {
        // 宮城県大衡村の座標（北緯38.47度、東経140.88度）
        let lat = 38.47;
        let lon = 140.88;
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=Asia%2FTokyo`);
        const data = await res.json();
        
        if (data && data.current_weather) {
          const temp = Math.round(data.current_weather.temperature);
          const code = data.current_weather.weathercode;
          const weatherMap = {
            0: "晴天 CLEAR", 1: "晴天 CLEAR", 2: "薄曇 CLOUDY", 3: "曇天 CLOUDY",
            45: "霧 FOG", 48: "霧 FOG", 51: "小雨 DRIZZLE", 53: "小雨 DRIZZLE", 55: "小雨",
            61: "雨 RAIN", 63: "本降りの雨 RAIN", 65: "大雨 HEAVY RAIN", 71: "小雪 SNOW", 73: "降雪 SNOW", 75: "大雪 SNOW",
            95: "雷雨 THUNDER"
          };
          const weatherDesc = weatherMap[code] || "CLEAR";
          weatherTextEl.innerText = `宮城 大衡村 // ${temp}℃ ${weatherDesc}`;
        }
      } catch (e) {
        weatherTextEl.innerText = "ONLINE";
      }
    }

    // --- SLIDES RENDERER ---
    window.renderSlideshow = function() {
      const container = document.getElementById('slides-container');
      if (!container) return;
      container.innerHTML = '';
      
      slides.forEach((slide, idx) => {
        const slideEl = document.createElement('div');
        slideEl.id = `slide-${idx}`;
        slideEl.className = `slide-transition absolute inset-0 w-full h-full p-16 flex flex-col justify-between rounded-[24px] satin-glass pointer-events-none`;
        
        let inner = '';
        if (slide.type === 'clock') {
          inner = `<div class="w-full flex justify-between items-start opacity-50"><span class="text-xs font-bold tracking-widest minimal-tech">PORTAL INFOMETRY</span><i data-lucide="clock" class="w-5 h-5"></i></div><div class="my-auto text-center space-y-10"><h1 id="slide-clock-${idx}" class="text-[12rem] font-extrabold text-slate-800 tracking-tighter serif-letterpress leading-none">00:00</h1><p class="text-2xl text-slate-500 font-light max-w-4xl mx-auto">${slide.content}</p></div><div class="w-full text-center text-[10px] font-bold opacity-30 minimal-tech uppercase">${slide.title}</div>`;
        } else if (slide.type === 'schedule') {
          const lines = slide.content.split('\n').filter(l => l.trim());
          const list = lines.map(l => {
            const p = l.split('|');
            return `<div class="flex items-center gap-10 border-b border-black/[0.03] pb-4"><span class="text-2xl font-bold text-slate-300 minimal-tech w-32 uppercase">${p[0]}</span><span class="text-3xl font-medium text-slate-700">${p[1]||l}</span></div>`;
          }).join('');
          inner = `<div class="w-full flex justify-between mb-8 opacity-40"><span class="text-xs font-bold tracking-widest minimal-tech">STATION DATA</span><i data-lucide="calendar" class="w-5 h-5"></i></div><div class="flex-grow flex flex-col max-w-4xl mx-auto w-full"><h2 class="text-3xl font-black mb-10 border-b-4 border-slate-900 pb-4 uppercase tracking-widest minimal-tech">${slide.title}</h2><div class="space-y-6">${list}</div></div>`;
        } else if (slide.type === 'weekly') {
          const lines = slide.content.split('\n').filter(l => l.trim());
          const list = lines.map(l => {
            const p = l.split('|');
            return `
              <div class="flex-grow flex flex-col p-6 bg-white/30 border border-white/50 rounded-2xl min-w-[150px] max-w-[220px]">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest minimal-tech border-b border-black/[0.04] pb-2 mb-2 text-center">${p[0]||'曜日'}</span>
                <span class="text-lg font-medium text-slate-700 leading-snug break-words text-center">${p[1]||l}</span>
              </div>
            `;
          }).join('');
          inner = `<div class="w-full flex justify-between mb-8 opacity-40"><span class="text-xs font-bold tracking-widest minimal-tech">WEEKLY CHRONICLE</span><i data-lucide="calendar" class="w-5 h-5"></i></div><div class="flex-grow flex flex-col max-w-4xl mx-auto w-full"><h2 class="text-3xl font-black mb-10 border-b-4 border-slate-900 pb-4 uppercase tracking-widest minimal-tech">${slide.title}</h2><div class="flex flex-wrap gap-4 justify-center items-stretch">${list}</div></div>`;
        } else if (slide.type === 'image') {
          inner = `<div class="w-full h-full flex items-center gap-16"><div class="w-1/2 h-full rounded-3xl overflow-hidden shadow-2xl border border-white"><img src="${slide.content_img}" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=800'"></div><div class="w-1/2 space-y-8 text-left"><span class="text-xs font-bold text-indigo-500 tracking-widest minimal-tech">FEATURED ASSET</span><h2 class="text-6xl font-black text-slate-800">${slide.title}</h2><div class="h-1.5 w-20 bg-slate-800 rounded"></div><p class="text-2xl text-slate-500 font-light leading-relaxed">${slide.content}</p></div></div>`;
        }
        slideEl.innerHTML = inner;
        container.appendChild(slideEl);
        
        if (slide.type === 'clock') {
          setInterval(() => {
            const el = document.getElementById(`slide-clock-${idx}`);
            if (el) el.innerText = new Date().toLocaleTimeString('ja-JP', { hour12:false, hour:'2-digit', minute:'2-digit' });
          }, 1000);
        }
      });
      lucide.createIcons();
      window.showSlide(currentSlideIndex);
    }

    // --- VISUAL DESIGNER LOGIC ---
    window.selectLayout = (type) => {
      activeDesignLayout = type;
      document.querySelectorAll('.layout-card').forEach(el => el.classList.remove('selected'));
      const activeCard = Array.from(document.querySelectorAll('.layout-card')).find(el => el.getAttribute('onclick').includes(`'${type}'`));
      if (activeCard) activeCard.classList.add('selected');
      updateDesignerInputs();
    };

    // アップロードされた画像の一時Base64キャッシュ
    window.tempUploadedImageBase64 = "";

    window.triggerImageFileSelect = () => {
      document.getElementById('ds-image-file').click();
    };

    window.handleImageSelect = (e) => {
      const file = e.target.files[0];
      if (file) {
        processUploadedImage(file);
      }
    };

    window.handleImageDragOver = (e) => {
      e.preventDefault();
      e.currentTarget.classList.add('border-indigo-400', 'bg-indigo-50/50');
    };

    window.handleImageDragLeave = (e) => {
      e.preventDefault();
      e.currentTarget.classList.remove('border-indigo-400', 'bg-indigo-50/50');
    };

    window.handleImageDrop = (e) => {
      e.preventDefault();
      e.currentTarget.classList.remove('border-indigo-400', 'bg-indigo-50/50');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        processUploadedImage(file);
      } else {
        alert("画像ファイルのみアップロードが可能です。");
      }
    };

    // 画像の自動圧縮とBase64化 (Firestoreの上限対策)
    function processUploadedImage(file) {
      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const max_size = 800; // 最適な画像幅にリサイズして圧縮
          let width = img.width;
          let height = img.height;

          if (width > height) {
            if (width > max_size) {
              height *= max_size / width;
              width = max_size;
            }
          } else {
            if (height > max_size) {
              width *= max_size / height;
              height = max_size;
            }
          }
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);

          // 品質を調整してBase64形式に圧縮変換
          window.tempUploadedImageBase64 = canvas.toDataURL('image/jpeg', 0.7);

          // アップローダープレビューを適用
          const uploadInner = document.getElementById('ds-upload-inner');
          if (uploadInner) {
            uploadInner.innerHTML = `<img src="${window.tempUploadedImageBase64}" class="w-full h-full object-cover rounded-xl">`;
          }
          window.updateLivePreview();
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }

    window.updateDesignerInputs = function() {
      const container = document.getElementById('dynamic-visual-inputs');
      if (!container) return;
      container.innerHTML = '';
      window.tempUploadedImageBase64 = ""; // 新規選択ごとにキャッシュクリア

      let html = `
        <div class="space-y-1.5">
          <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest minimal-tech">Title / 見出し</label>
          <input type="text" id="ds-title" oninput="window.updateLivePreview()" placeholder="スライドの見出し" class="w-full px-4 py-2.5 rounded-xl bg-white border border-slate-200 text-sm outline-none focus:border-indigo-400">
        </div>
      `;

      if (activeDesignLayout === 'clock') {
        html += `
          <div class="space-y-1.5">
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest minimal-tech">Message / お知らせ内容</label>
            <textarea id="ds-content" oninput="window.updateLivePreview()" rows="3" class="w-full px-4 py-2.5 rounded-xl bg-white border border-slate-200 text-sm outline-none focus:border-indigo-400">最高の1日は、今日のあなたの行動から。</textarea>
          </div>
        `;
      } else if (activeDesignLayout === 'schedule') {
        html += `
          <div class="space-y-1.5">
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest minimal-tech">Today's Schedule (Time | Task)</label>
            <p class="text-[9px] text-slate-400">「時間 | 内容」を改行して入力してください。</p>
            <textarea id="ds-content" oninput="window.updateLivePreview()" rows="6" class="w-full px-4 py-2.5 rounded-xl bg-white border border-slate-200 text-sm outline-none focus:border-indigo-400 font-mono" placeholder="08:30 | 朝会&#10;12:15 | ランチタイム"></textarea>
          </div>
        `;
      } else if (activeDesignLayout === 'weekly') {
        html += `
          <div class="space-y-1.5">
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest minimal-tech">Weekly Schedule (Day | Task)</label>
            <p class="text-[9px] text-slate-400">「曜日 | 予定内容」を改行して入力してください。</p>
            <textarea id="ds-content" oninput="window.updateLivePreview()" rows="6" class="w-full px-4 py-2.5 rounded-xl bg-white border border-slate-200 text-sm outline-none focus:border-indigo-400 font-mono" placeholder="月 | 生徒会任命式&#10;火 | ノー部活デー"></textarea>
          </div>
        `;
      } else if (activeDesignLayout === 'image') {
        html += `
          <div class="space-y-1.5">
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest minimal-tech">1. Upload Image / 画像を選択</label>
            <div id="ds-drop-zone" 
                 onclick="window.triggerImageFileSelect()" 
                 ondragover="window.handleImageDragOver(event)" 
                 ondragleave="window.handleImageDragLeave(event)" 
                 ondrop="window.handleImageDrop(event)"
                 class="w-full h-32 border-2 border-dashed border-slate-200 rounded-2xl flex items-center justify-center p-2 cursor-pointer transition-all bg-white hover:border-indigo-300">
              <input type="file" id="ds-image-file" class="hidden" onchange="window.handleImageSelect(event)" accept="image/*">
              <div id="ds-upload-inner" class="text-center text-slate-400 space-y-1">
                <i data-lucide="cloud-upload" class="w-6 h-6 mx-auto"></i>
                <p class="text-xs font-bold text-slate-600">ここをタップして写真を選択</p>
                <p class="text-[9px]">ドラッグ＆ドロップでも可能</p>
              </div>
            </div>
          </div>
          <div class="space-y-1.5">
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest minimal-tech">またはWEB上の画像URL</label>
            <input type="text" id="ds-img" oninput="window.updateLivePreview()" placeholder="https://..." class="w-full px-4 py-2.5 rounded-xl bg-white border border-slate-200 text-sm outline-none">
          </div>
          <div class="space-y-1.5">
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest minimal-tech">2. Description / 詳細文</label>
            <textarea id="ds-content" oninput="window.updateLivePreview()" rows="3" class="w-full px-4 py-2.5 rounded-xl bg-white border border-slate-200 text-sm outline-none focus:border-indigo-400"></textarea>
          </div>
        `;
      }
      container.innerHTML = html;
      lucide.createIcons();
      window.updateLivePreview();
    }

    window.updateLivePreview = () => {
      const preview = document.getElementById('live-designer-preview');
      if (!preview) return;
      const title = document.getElementById('ds-title')?.value || 'TITLE';
      const content = document.getElementById('ds-content')?.value || '';
      const imgUrl = document.getElementById('ds-img')?.value || '';
      const finalImg = window.tempUploadedImageBase64 || imgUrl || 'https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=800';

      let layoutHTML = '';
      if (activeDesignLayout === 'clock') {
        layoutHTML = `
          <div class="w-full h-full p-20 flex flex-col justify-between items-center text-center">
            <span class="text-[12px] font-bold tracking-[0.4em] text-slate-400 uppercase minimal-tech">PORTAL INFOMETRY</span>
            <div class="my-auto space-y-10">
              <h1 class="text-9xl font-extrabold text-slate-800 tracking-tighter serif-letterpress">12:34</h1>
              <p class="text-3xl text-slate-600 font-light max-w-4xl">${content}</p>
            </div>
            <span class="text-[10px] font-bold tracking-[0.4em] text-slate-300 uppercase minimal-tech">${title}</span>
          </div>
        `;
      } else if (activeDesignLayout === 'schedule') {
        const lines = content.split('\n').filter(l => l.trim());
        let listHTML = lines.map(l => {
          const p = l.split('|');
          return `<div class="flex items-center gap-10 border-b border-black/[0.03] pb-4 last:border-0"><span class="text-2xl font-bold text-slate-300 minimal-tech w-32 uppercase">${p[0]||'--'}</span><span class="text-3xl font-medium text-slate-700">${p[1]||l}</span></div>`;
        }).join('');
        layoutHTML = `
          <div class="w-full h-full p-20 flex flex-col justify-between">
            <div class="w-full flex justify-between mb-8 opacity-40"><span class="text-xs font-bold tracking-widest minimal-tech">STATION DATA</span><i data-lucide="calendar" class="w-5 h-5"></i></div>
            <div class="flex-grow flex flex-col max-w-4xl mx-auto w-full">
              <h2 class="text-4xl font-black mb-10 border-b-4 border-slate-900 pb-4 uppercase tracking-widest minimal-tech">${title}</h2>
              <div class="space-y-6">${listHTML || '<p class="text-slate-400 text-xl">スケジュールデータを入力してください</p>'}</div>
            </div>
            <div class="w-full text-center text-[8px] text-slate-400 font-bold uppercase tracking-[0.4em] minimal-tech">Sync Status Active</div>
          </div>
        `;
      } else if (activeDesignLayout === 'weekly') {
        const lines = content.split('\n').filter(l => l.trim());
        let listHTML = lines.map(l => {
          const p = l.split('|');
          return `
            <div class="flex-grow flex flex-col p-6 bg-white/30 border border-white/50 rounded-2xl min-w-[150px] max-w-[220px]">
              <span class="text-sm font-bold text-slate-400 uppercase tracking-widest minimal-tech border-b border-black/[0.04] pb-2 mb-2 text-center">${p[0]||'曜日'}</span>
              <span class="text-lg font-medium text-slate-700 leading-snug break-words text-center">${p[1]||l}</span>
            </div>
          `;
        }).join('');
        layoutHTML = `
          <div class="w-full h-full p-20 flex flex-col justify-between">
            <div class="w-full flex justify-between mb-8 opacity-40"><span class="text-xs font-bold tracking-widest minimal-tech">WEEKLY CHRONICLE</span><i data-lucide="calendar" class="w-5 h-5"></i></div>
            <div class="flex-grow flex flex-col max-w-4xl mx-auto w-full">
              <h2 class="text-4xl font-black mb-10 border-b-4 border-slate-900 pb-4 uppercase tracking-widest minimal-tech">${title}</h2>
              <div class="flex flex-wrap gap-4 justify-center items-stretch">${listHTML || '<p class="text-slate-400 text-xl">スケジュールを曜日ごとに指定してください</p>'}</div>
            </div>
            <div class="w-full text-center text-[8px] text-slate-400 font-bold uppercase tracking-[0.4em] minimal-tech">Weekly System Ready</div>
          </div>
        `;
      } else if (activeDesignLayout === 'image') {
        layoutHTML = `
          <div class="w-full h-full flex items-center p-20 gap-20">
            <div class="w-1/2 h-full rounded-[32px] overflow-hidden shadow-2xl border border-white/40 bg-slate-200">
              <img src="${finalImg}" class="w-full h-full object-cover">
            </div>
            <div class="w-1/2 space-y-8 text-left">
              <span class="text-xs font-bold text-indigo-500 tracking-widest minimal-tech">FEATURED ASSET</span>
              <h2 class="text-6xl font-black text-slate-800 leading-tight">${title}</h2>
              <div class="h-1.5 w-20 bg-slate-800 rounded"></div>
              <p class="text-2xl text-slate-500 leading-relaxed font-light">${content || '説明文を入力してください'}</p>
            </div>
          </div>
        `;
      }

      preview.innerHTML = layoutHTML;
      lucide.createIcons();
    };

    window.addNewSlide = () => {
      const imgUrl = document.getElementById('ds-img')?.value || '';
      const finalImg = window.tempUploadedImageBase64 || imgUrl || 'https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=800';

      const newSlide = {
        id: "s-" + Date.now(),
        type: activeDesignLayout,
        title: document.getElementById('ds-title').value,
        content: document.getElementById('ds-content')?.value || "",
        content_img: finalImg,
        align: "center",
        duration: 8
      };
      
      slides.push(newSlide);
      setDoc(slidesDocRef, { slides }).then(() => {
        closeNewSlideModal();
        showAlert("NEW SLIDE SYNCED");
      });
    };

    // --- SLIDESHOW CONTROLLER SCOPE ADJUSTMENT ---
    window.showSlide = function(index) {
      if (!slides.length) return;
      document.querySelectorAll('.slide-transition').forEach(el => el.classList.remove('active'));
      const active = document.getElementById(`slide-${index}`);
      if (active) active.classList.add('active');
      const duration = (slides[index].duration || globalDuration) * 1000;
      const bar = document.getElementById('slide-progress');
      if (bar) {
        bar.style.transition = 'none'; bar.style.width = '0%';
        setTimeout(() => { bar.style.transition = `width ${duration}ms linear`; bar.style.width = '100%'; }, 50);
      }
    };

    window.startSlideshowLoop = function() {
      if (slideshowTimer) clearTimeout(slideshowTimer);
      if (slides.length <= 1) return;
      slideshowTimer = setTimeout(() => {
        currentSlideIndex = (currentSlideIndex + 1) % slides.length;
        window.showSlide(currentSlideIndex);
        window.startSlideshowLoop();
      }, (slides[currentSlideIndex].duration || globalDuration) * 1000);
    };

    window.applyTicker = () => {
      const el = document.getElementById('ticker-content');
      if (el) el.innerText = `${tickerText}   +++   ${tickerText}`;
    }

    window.toggleAdminPanel = () => {
      const p = document.getElementById('admin-panel');
      if (!p) return;
      p.classList.toggle('translate-x-full');
      if (isEditingMode) {
        document.getElementById('global-duration').value = globalDuration;
        document.getElementById('global-ticker-text').value = tickerText;
      }
    };

    window.openAdminPanelDirectly = () => window.toggleAdminPanel();

    window.saveGlobalSettings = () => {
      globalDuration = parseInt(document.getElementById('global-duration').value);
      tickerText = document.getElementById('global-ticker-text').value;
      setDoc(settingsDocRef, { tickerText, globalDuration }).then(() => showAlert("STUDIO SYNCED"));
    };

    window.saveApiKey = () => {
      apiKey = document.getElementById('api-key-input').value;
      localStorage.setItem(`${appId}-gemini-api-key`, apiKey);
      showAlert("AI LINK SECURED");
    };

    window.renderAdminSlidesList = () => {
      const container = document.getElementById('admin-slides-list');
      if (!container) return;
      container.innerHTML = slides.map((s, i) => `
        <div class="p-4 bg-white rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between group">
          <div class="overflow-hidden text-left">
            <p class="text-[9px] font-bold text-indigo-500 uppercase minimal-tech">${s.type}</p>
            <p class="text-xs font-bold text-slate-800 truncate">${s.title}</p>
          </div>
          <button onclick="deleteSlide(${i})" class="p-2 text-slate-300 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
        </div>
      `).join('');
      lucide.createIcons();
    };

    window.deleteSlide = (idx) => {
      if (confirm("Delete this slide?")) {
        slides.splice(idx, 1);
        setDoc(slidesDocRef, { slides });
      }
    };

    window.openNewSlideModal = () => {
      document.getElementById('slide-creator-modal').classList.remove('hidden');
      window.selectLayout('clock');
    };

    window.closeNewSlideModal = () => document.getElementById('slide-creator-modal').classList.add('hidden');

    window.showAlert = (msg) => {
      const el = document.getElementById('custom-alert');
      const textEl = document.getElementById('custom-alert-text');
      if (el && textEl) {
        textEl.innerText = msg;
        el.classList.remove('-translate-y-24');
        setTimeout(() => el.classList.add('-translate-y-24'), 3000);
      }
    };

    window.resetToDefaults = () => {
      if (confirm("Reset everything?")) {
        setDoc(slidesDocRef, { slides: getInitialDefaultSlides() });
        setDoc(settingsDocRef, { tickerText: "Welcome to Ohira JHS", globalDuration: 8 });
      }
    };

    // モジュール内部のドラッグ&ドロップイベント用バインド
    window.triggerImageFileSelect = window.triggerImageFileSelect;
    window.handleImageSelect = window.handleImageSelect;
    window.handleImageDragOver = window.handleImageDragOver;
    window.handleImageDragLeave = window.handleImageDragLeave;
    window.handleImageDrop = window.handleImageDrop;

  </script>
</body>
</html>
